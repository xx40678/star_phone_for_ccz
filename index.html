<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone Dark Mode Phone App - v7</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #000;
  --card-bg: #1c1c1e;
  --accent: #0A84FF;
  --ios-blur: blur(25px);
  --icon-dark-bg: rgba(20, 20, 22, 0.85);
}
body {
  margin: 0; padding: 0; background: #121212; 
  display: flex; justify-content: center; align-items: center; 
  min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
}
.phone {
  width: 375px; height: 812px; 
  background: linear-gradient(135deg, #2c2c2e 0%, #000000 100%);
  border-radius: 50px; overflow: hidden; position: relative;
  box-shadow: 0 40px 80px rgba(0,0,0,0.6);
  border: 10px solid #2c2c2e;
}
.screen { position: absolute; inset: 0; z-index: 10; }
.hidden { display: none !important; }

/* 狀態列 */
.status-bar {
  position: absolute; top: 0; width: 100%; height: 44px;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 30px; box-sizing: border-box; z-index: 1000; color: #fff; font-size: 14px;
}
.notch {
  width: 160px; height: 28px; background: #2c2c2e; position: absolute; top: 0; left: 50%;
  transform: translateX(-50%); border-bottom-left-radius: 18px; border-bottom-right-radius: 18px;
}

/* 鎖屏 */
#lock {
  z-index: 500; display: flex; flex-direction: column; align-items: center; 
  padding-top: 100px; box-sizing: border-box; cursor: pointer;
}
.lock-time { font-size: 82px; font-weight: 200; color: #fff; line-height: 1; }
.lock-date { font-size: 20px; color: #fff; margin-top: 8px; }
.lock-widget {
  margin-top: 15px; background: rgba(255, 255, 255, 0.1);
  padding: 8px 16px; border-radius: 12px; backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1); color: rgba(255, 255, 255, 0.9); font-size: 13px;
}

/* 主畫面 */
#home { padding: 60px 25px; }
.app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
.app { text-align: center; color: #fff; cursor: pointer; transition: transform 0.2s; }
.app:active { transform: scale(0.9); }
.icon {
  width: 60px; height: 60px; border-radius: 14px; background: var(--icon-dark-bg);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 5px; font-size: 28px; border: 1px solid rgba(255,255,255,0.1);
}
.app span { font-size: 11px; font-weight: 500; opacity: 0.9; }

.dock {
  position: absolute; bottom: 30px; left: 15px; right: 15px; height: 90px;
  background: rgba(255,255,255,0.1); backdrop-filter: var(--ios-blur);
  border-radius: 35px; display: flex; justify-content: space-evenly; align-items: center;
}

/* App 視窗通用 */
.app-window {
  position: absolute; inset: 0; background: #000; z-index: 800;
  display: none; flex-direction: column; opacity: 0; 
  transition: transform 0.4s cubic-bezier(0.1, 0.7, 0.1, 1), opacity 0.3s;
  transform: scale(0.95);
}
.app-window.active { display: flex; opacity: 1; transform: scale(1); }

.header {
  padding: 50px 20px 15px; background: #1c1c1e; display: flex; align-items: center; border-bottom: 0.5px solid #333;
}

/* 電話聯絡人列表樣式 */
.contact-list { flex: 1; overflow-y: auto; padding: 10px 0; }
.contact-item {
  padding: 15px 20px; border-bottom: 0.5px solid #2c2c2e;
  color: #fff; font-size: 17px; cursor: pointer; display: flex; align-items: center;
}
.contact-item:active { background: #2c2c2e; }
.avatar {
  width: 36px; height: 36px; border-radius: 50%; background: #444; 
  margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600;
}

/* 訊息相關 */
.chat-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
.bubble { max-width: 75%; padding: 11px 16px; border-radius: 20px; font-size: 15px; color: #fff; }
.me { background: var(--accent); align-self: flex-end; }
.you { background: #3a3a3c; align-self: flex-start; }

/* 自定義彈出提示 (Alert) */
.custom-alert {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
  width: 270px; background: rgba(30, 30, 30, 0.95); backdrop-filter: blur(20px);
  border-radius: 14px; overflow: hidden; display: none; flex-direction: column;
  z-index: 3000; box-shadow: 0 10px 40px rgba(0,0,0,0.5); opacity: 0; transition: 0.2s;
}
.custom-alert.show { display: flex; opacity: 1; transform: translate(-50%, -50%) scale(1); }
.alert-content { padding: 20px; color: #fff; text-align: center; font-size: 17px; font-weight: 600; }
.alert-btn {
  padding: 12px; color: var(--accent); text-align: center; border-top: 0.5px solid #444; 
  cursor: pointer; font-size: 17px; font-weight: 600;
}

.home-bar { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 5px; background: #fff; border-radius: 10px; opacity: 0.4; }
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>
  <div class="status-bar">
    <div id="status-time">00:00</div>
    <div><i class="fas fa-signal"></i> <i class="fas fa-wifi"></i> <i class="fas fa-battery-three-quarters"></i></div>
  </div>

  <div id="alert" class="custom-alert">
    <div class="alert-content" id="alert-text">提示內容</div>
    <div class="alert-btn" onclick="closeAlert()">好</div>
  </div>

  <div id="lock" class="screen" onclick="unlock()">
    <div class="lock-time" id="lock-time">00:00</div>
    <div class="lock-date" id="lock-date">3月24日 星期二</div>
    <div class="lock-widget"><i class="fas fa-heart" style="color: #ff2d55; margin-right:4px;"></i> 你不在，我其實也不太想解鎖。</div>
    <div style="margin-top: auto; margin-bottom: 60px; color:#fff; font-size:14px; opacity:0.5;"><i class="fas fa-chevron-up"></i> 向上滑動以解鎖</div>
  </div>

  <div id="home" class="screen hidden">
    <div class="app-grid">
      <div class="app" onclick="openApp('messages')">
        <div class="icon" style="color: #4cd964;"><i class="fas fa-comment"></i></div>
        <span>訊息</span>
      </div>
      <div class="app" onclick="openApp('love')">
        <div class="icon" style="color: #ff3b30;"><i class="fas fa-heart"></i></div>
        <span>關係</span>
      </div>
    </div>
    
    <div class="dock">
        <div class="app" onclick="openApp('phone-app')"><div class="icon" style="color: #32D74B;"><i class="fas fa-phone"></i></div></div>
        <div class="app"><div class="icon" style="color: #5AC8FA;"><i class="fas fa-compass"></i></div></div>
        <div class="app"><div class="icon" style="color: #FF9F0A;"><i class="fas fa-envelope"></i></div></div>
        <div class="app"><div class="icon" style="color: #A2845E;"><i class="fas fa-music"></i></div></div>
    </div>
    <div class="home-bar"></div>
  </div>

  <div id="phone-app" class="app-window">
    <div class="header">
      <i class="fas fa-chevron-left" style="color:var(--accent); font-size: 20px; cursor:pointer" onclick="closeApp()"></i>
      <div style="flex:1; text-align:center; color:#fff; font-weight: 600;">聯絡人</div>
      <div style="width: 20px;"></div>
    </div>
    <div class="contact-list">
        <div class="contact-item" onclick="showAlert('不知道你現在在幹嘛?')">
            <div class="avatar" style="background: #5856d6;">C</div> ccz
        </div>
        <div class="contact-item" onclick="showAlert('不想上班')">
            <div class="avatar" style="background: #8e8e93;">B</div> boss
        </div>
        <div class="contact-item" onclick="showAlert('想家了...')">
            <div class="avatar" style="background: #ff9500;">M</div> mom
        </div>
    </div>
  </div>

  <div id="messages" class="app-window">
    <div class="header">
      <i class="fas fa-chevron-left" style="color:var(--accent); font-size: 20px; cursor:pointer" onclick="closeApp()"></i>
      <div style="flex:1; text-align:center; color:#fff; font-weight: 600;">ccz</div>
      <div style="width: 20px;"></div>
    </div>
    <div id="chat-body" class="chat-body"></div>
    <div style="padding:15px 15px 40px; background:#000">
        <div style="background:#1c1c1e; border-radius:20px; padding:12px 15px; color:#8e8e93; border: 1px solid #333; cursor:pointer">iMessage</div>
    </div>
  </div>

  <div id="love" class="app-window">
    <div class="header">
      <i class="fas fa-chevron-left" style="color:var(--accent); font-size: 20px; cursor:pointer" onclick="closeApp()"></i>
      <div style="flex:1; text-align:center; color:#fff; font-weight: 600;">Relationship</div>
      <div style="width: 20px;"></div>
    </div>
    <div id="love-content" style="padding:20px;"></div>
  </div>
</div>

<script>
function updateTime() {
    const d = new Date();
    const timeStr = d.toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit', hour12: false});
    document.querySelectorAll('#status-time, #lock-time').forEach(el => el.innerText = timeStr);
    const dateStr = d.toLocaleDateString('zh-TW', {month:'long', day:'numeric', weekday: 'long'});
    if(document.getElementById('lock-date')) document.getElementById('lock-date').innerText = dateStr;
}

function unlock() {
    const lock = document.getElementById('lock');
    lock.style.transition = '0.5s cubic-bezier(0.4, 0, 0.2, 1)';
    lock.style.transform = 'translateY(-100%)';
    lock.style.opacity = '0';
    setTimeout(() => { lock.classList.add('hidden'); document.getElementById('home').classList.remove('hidden'); }, 500);
}

function openApp(id) {
    document.getElementById(id).classList.add('active');
    if (id === 'love') renderLove();
}

function closeApp() {
    document.querySelectorAll('.app-window').forEach(win => win.classList.remove('active'));
}

// 聯絡人彈窗邏輯
function showAlert(text) {
    const alert = document.getElementById('alert');
    document.getElementById('alert-text').innerText = text;
    alert.classList.add('show');
}

function closeAlert() {
    document.getElementById('alert').classList.remove('show');
}

function renderLove() {
    const el = document.getElementById("love-content");
    el.innerHTML = `
        <div style="background:#1c1c1e; padding:20px; border-radius:18px; margin-bottom:20px; border: 1px solid #2c2c2e;">
            <div style="color:#8e8e93; font-size:12px; font-weight: 600; text-transform: uppercase;">目前關係強度</div>
            <div style="font-size:36px; font-weight:700; margin:10px 0; color: #fff;">80%</div>
            <div style="height:10px; background:#333; border-radius:5px; overflow:hidden">
                <div id="love-pbar" style="width:0%; height:100%; background:linear-gradient(90deg, #ff2d55, #ff5e5e); transition: 1.5s cubic-bezier(0.1, 0.7, 0.1, 1);"></div>
            </div>
        </div>
        <div style="background:#1c1c1e; padding:20px; border-radius:18px; border: 1px solid #2c2c2e;">
            <p style="color:#fff; line-height: 1.6; margin: 0; font-size: 15px;">「你如果再晚睡，我不保證我還會這麼冷靜。」</p>
        </div>
    `;
    setTimeout(() => { document.getElementById('love-pbar').style.width = '80%'; }, 100);
}

updateTime();
setInterval(updateTime, 1000);
</script>
</body>
</html>
