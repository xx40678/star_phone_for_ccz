<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone Dark Mode Final - v11</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --bg: #000;
  --accent: #0A84FF;
  --ios-blur: blur(25px);
  --icon-dark-bg: rgba(28, 28, 30, 0.9);
}

body {
  margin: 0; padding: 0; background: #121212; 
  display: flex; justify-content: center; align-items: center; 
  min-height: 100vh; font-family: -apple-system, sans-serif;
  overflow: hidden;
}

.phone {
  width: 375px; height: 812px; background: #000;
  border-radius: 50px; overflow: hidden; position: relative;
  box-shadow: 0 40px 80px rgba(0,0,0,0.6);
  border: 12px solid #2c2c2e;
}

.screen-layer { position: absolute; inset: 0; width: 100%; height: 100%; }

/* 狀態列 */
.status-bar {
  position: absolute; top: 0; width: 100%; height: 44px;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 30px; box-sizing: border-box; z-index: 10000; color: #fff; font-size: 14px;
}
.notch {
  width: 160px; height: 28px; background: #2c2c2e; position: absolute; top: 0; left: 50%;
  transform: translateX(-50%); border-bottom-left-radius: 18px; border-bottom-right-radius: 18px; z-index: 10001;
}

/* 鎖屏 */
#lock-screen {
  background: linear-gradient(180deg, #2c2c2e 0%, #000 100%);
  z-index: 8000; display: flex; flex-direction: column; align-items: center; padding-top: 100px;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s;
}

/* 主畫面 */
#home-screen { z-index: 100; padding: 60px 25px; background: #000; }
.app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
.app { text-align: center; color: #fff; cursor: pointer; }
.icon {
  width: 60px; height: 60px; border-radius: 15px; background: var(--icon-dark-bg);
  display: flex; align-items: center; justify-content: center; margin: 0 auto 5px;
  font-size: 28px; border: 1px solid rgba(255,255,255,0.1);
}
.dock {
  position: absolute; bottom: 30px; left: 15px; right: 15px; height: 90px;
  background: rgba(255,255,255,0.15); backdrop-filter: var(--ios-blur);
  border-radius: 35px; display: flex; justify-content: space-evenly; align-items: center;
}

/* App 視窗 */
.app-window {
  z-index: 1000; background: #000; display: none; flex-direction: column;
  transform: scale(0.9); opacity: 0; transition: 0.3s cubic-bezier(0.1, 0.7, 0.1, 1);
}
.app-window.active { display: flex; transform: scale(1); opacity: 1; }

.header {
  padding: 50px 20px 15px; background: #1c1c1e; display: flex; align-items: center; border-bottom: 0.5px solid #333;
}

/* 列表項 (訊息列表 & 聯絡人) */
.list-item {
  padding: 15px 20px; display: flex; align-items: center; border-bottom: 0.5px solid #222; cursor: pointer; color: #fff;
}
.list-item:active { background: #1c1c1e; }
.avatar { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 600; margin-right: 15px; }
.list-info { flex: 1; }
.list-name { font-weight: 600; font-size: 17px; display: block; } /* 確保文字顯示 */
.list-preview { color: #8e8e93; font-size: 14px; margin-top: 2px; }

/* 聊天與選單 */
.chat-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
.bubble { max-width: 75%; padding: 11px 16px; border-radius: 20px; font-size: 15px; color: #fff; line-height: 1.4; }
.me { background: var(--accent); align-self: flex-end; }
.you { background: #3a3a3c; align-self: flex-start; }

.ios-menu {
  position: absolute; bottom: 100px; left: 15px; right: 15px;
  background: rgba(44, 44, 46, 0.98); border-radius: 14px; display: none; flex-direction: column; z-index: 2000;
}
.ios-menu.show { display: flex; }
.menu-item { padding: 18px; color: var(--accent); text-align: center; border-bottom: 0.5px solid #444; cursor: pointer; font-size: 17px; }

/* 彈窗 */
.custom-alert {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
  width: 270px; background: rgba(30, 30, 30, 0.95); backdrop-filter: blur(20px);
  border-radius: 14px; display: none; flex-direction: column; z-index: 9500; opacity: 0; transition: 0.2s;
}
.custom-alert.active { display: flex; opacity: 1; transform: translate(-50%, -50%) scale(1); }
.alert-btn { padding: 12px; color: var(--accent); text-align: center; border-top: 0.5px solid #444; cursor: pointer; font-weight: 600; }

.home-bar { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 120px; height: 5px; background: #fff; border-radius: 10px; opacity: 0.4; z-index: 10000; }
</style>
</head>
<body onclick="hideMenu()">

<div class="phone">
  <div class="notch"></div>
  <div class="status-bar">
    <div id="status-time">00:00</div>
    <div><i class="fas fa-signal"></i> <i class="fas fa-wifi"></i> <i class="fas fa-battery-three-quarters"></i></div>
  </div>

  <div id="lock-screen" class="screen-layer" onclick="unlock()">
    <div class="lock-time" id="lock-time">00:00</div>
    <div class="lock-date" id="lock-date">3月24日 星期二</div>
    <div class="lock-widget" style="margin-top:20px; background:rgba(255,255,255,0.1); padding:8px 16px; border-radius:12px; color:#fff; font-size:13px;">
        <i class="fas fa-heart" style="color:#ff2d55; margin-right:4px;"></i> 你不在，我其實也不太想解鎖。
    </div>
    <div style="margin-top:auto; margin-bottom:60px; color:#fff; font-size:14px; opacity:0.5;"><i class="fas fa-chevron-up"></i> 點擊解鎖</div>
  </div>

  <div id="home-screen" class="screen-layer">
    <div class="app-grid">
      <div class="app" onclick="openApp('msg-list-win')">
        <div class="icon" style="color:#4cd964;"><i class="fas fa-comment"></i></div>
        <span>訊息</span>
      </div>
      <div class="app" onclick="openApp('love-win')">
        <div class="icon" style="color:#ff3b30;"><i class="fas fa-heart"></i></div>
        <span>關係</span>
      </div>
    </div>
    <div class="dock">
        <div class="app" onclick="openApp('phone-win')"><div class="icon" style="color:#32D74B;"><i class="fas fa-phone"></i></div></div>
        <div class="app"><div class="icon" style="color:#5AC8FA;"><i class="fas fa-compass"></i></div></div>
        <div class="app"><div class="icon" style="color:#FF9F0A;"><i class="fas fa-envelope"></i></div></div>
        <div class="app"><div class="icon" style="color:#A2845E;"><i class="fas fa-music"></i></div></div>
    </div>
  </div>

  <div id="msg-list-win" class="app-window screen-layer">
    <div class="header">
        <i class="fas fa-chevron-left" style="color:var(--accent); cursor:pointer" onclick="closeApp()"></i>
        <div style="flex:1; text-align:center; color:#fff; font-weight:600;">訊息</div>
    </div>
    <div class="list-item" onclick="openApp('chat-ccz-win')">
        <div class="avatar" style="background:#5856d6;">C</div>
        <div class="list-info"><span class="list-name">ccz</span><div class="list-preview">你在生氣？</div></div>
    </div>
    <div class="list-item" onclick="openApp('chat-box-win')">
        <div class="avatar" style="background:#8e8e93;"><i class="fas fa-box"></i></div>
        <div class="list-info"><span class="list-name">到貨通知</span><div class="list-preview">化妝品包裹已抵達門市...</div></div>
    </div>
  </div>

  <div id="chat-ccz-win" class="app-window screen-layer">
    <div class="header">
        <i class="fas fa-chevron-left" style="color:var(--accent); cursor:pointer" onclick="openApp('msg-list-win')"></i>
        <div style="flex:1; text-align:center; color:#fff; font-weight:600;">ccz</div>
    </div>
    <div class="chat-body" id="ccz-chat-box">
        <div class="bubble you">今天有好好吃飯嗎？</div>
        <div class="bubble me">…有</div>
        <div class="bubble me">別管那麼多</div>
        <div class="bubble you">你在生氣？</div>
    </div>
    <div id="ccz-menu" class="ios-menu">
        <div class="menu-item" onclick="sendReply('怎麼會對你生氣', '乖乖等我回家')">怎麼會對你生氣</div>
        <div class="menu-item" onclick="sendReply('哪有', '憋死你算了')">哪有</div>
    </div>
    <div style="padding:15px 15px 40px; background:#000">
        <div onclick="toggleMenu(event)" style="background:#1c1c1e; border-radius:20px; padding:12px 15px; color:#8e8e93; border: 1px solid #333; cursor:pointer">iMessage</div>
    </div>
  </div>

  <div id="chat-box-win" class="app-window screen-layer">
    <div class="header">
        <i class="fas fa-chevron-left" style="color:var(--accent); cursor:pointer" onclick="openApp('msg-list-win')"></i>
        <div style="flex:1; text-align:center; color:#fff; font-weight:600;">到貨通知</div>
    </div>
    <div class="chat-body">
        <div class="bubble you" style="background:#262629;">您的化妝品包裹已抵達門市，請領取。</div>
    </div>
    <div style="padding:15px 15px 40px; background:#000">
        <div onclick="showAlert('這是買給 ccz 的禮物，偷偷藏在包裹裡。')" style="background:#1c1c1e; border-radius:20px; padding:12px 15px; color:#8e8e93; border: 1px solid #333; cursor:pointer">輸入訊息...</div>
    </div>
  </div>

  <div id="phone-win" class="app-window screen-layer">
    <div class="header">
        <i class="fas fa-chevron-left" style="color:var(--accent); cursor:pointer" onclick="closeApp()"></i>
        <div style="flex:1; text-align:center; color:#fff;">聯絡人</div>
    </div>
    <div class="list-item" onclick="showAlert('不知道你現在在幹嘛?')">
        <div class="avatar" style="background:#5856d6;">C</div> <span class="list-name">ccz</span>
    </div>
    <div class="list-item" onclick="showAlert('不想上班')">
        <div class="avatar" style="background:#8e8e93;">B</div> <span class="list-name">boss</span>
    </div>
    <div class="list-item" onclick="showAlert('想家了...')">
        <div class="avatar" style="background:#ff9500;">M</div> <span class="list-name">mom</span>
    </div>
  </div>

  <div id="love-win" class="app-window screen-layer">
    <div class="header"><i class="fas fa-chevron-left" style="color:var(--accent); cursor:pointer" onclick="closeApp()"></i><div style="flex:1; text-align:center; color:#fff;">Relationship</div></div>
    <div id="love-content" style="padding:20px;"></div>
  </div>

  <div id="alert-box" class="custom-alert">
    <div id="alert-msg" style="padding:20px; color:#fff; text-align:center;"></div>
    <div class="alert-btn" onclick="closeAlert()">好</div>
  </div>

  <div class="home-bar"></div>
</div>

<script>
function updateTime() {
    const d = new Date();
    const timeStr = d.toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit', hour12:false});
    document.querySelectorAll('#status-time, #lock-time').forEach(el => el.innerText = timeStr);
    const dateStr = d.toLocaleDateString('zh-TW', {month:'long', day:'numeric', weekday:'long'});
    document.getElementById('lock-date').innerText = dateStr;
}

function unlock() {
    const lock = document.getElementById('lock-screen');
    lock.style.transform = 'translateY(-100%)';
    lock.style.opacity = '0';
    setTimeout(() => lock.style.display = 'none', 600);
}

function openApp(id) {
    document.querySelectorAll('.app-window').forEach(w => w.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 'love-win') renderLove();
    if(id === 'chat-ccz-win') {
        const box = document.getElementById('ccz-chat-box');
        box.scrollTop = box.scrollHeight;
    }
}

function closeApp() {
    document.querySelectorAll('.app-window').forEach(w => w.classList.remove('active'));
}

function toggleMenu(e) {
    e.stopPropagation();
    document.getElementById('ccz-menu').classList.toggle('show');
}

function hideMenu() {
    document.getElementById('ccz-menu').classList.remove('show');
}

function sendReply(my, you) {
    const box = document.getElementById('ccz-chat-box');
    box.innerHTML += `<div class="bubble me">${my}</div>`;
    hideMenu();
    setTimeout(() => {
        box.innerHTML += `<div class="bubble you">${you}</div>`;
        box.scrollTop = box.scrollHeight;
    }, 1000);
}

function showAlert(text) {
    document.getElementById('alert-msg').innerText = text;
    document.getElementById('alert-box').style.display = 'flex';
    setTimeout(() => document.getElementById('alert-box').classList.add('active'), 10);
}

function closeAlert() {
    document.getElementById('alert-box').classList.remove('active');
    setTimeout(() => document.getElementById('alert-box').style.display = 'none', 200);
}

function renderLove() {
    const el = document.getElementById("love-content");
    el.innerHTML = `
        <div style="background:#1c1c1e; padding:20px; border-radius:18px; margin-bottom:20px; border: 1px solid #2c2c2e;">
            <div style="color:#8e8e93; font-size:12px;">目前關係強度</div>
            <div style="font-size:36px; font-weight:700; margin:10px 0; color: #fff;">80%</div>
            <div style="height:10px; background:#333; border-radius:5px; overflow:hidden">
                <div id="love-pbar" style="width:0%; height:100%; background:linear-gradient(90deg, #ff2d55, #ff5e5e); transition: 1.5s ease-out;"></div>
            </div>
        </div>
        <div style="background:#1c1c1e; padding:20px; border-radius:18px; border: 1px solid #2c2c2e; color:#fff;">
            「你如果再晚睡，我不保證我還會這麼冷靜。」
        </div>
    `;
    setTimeout(() => document.getElementById('love-pbar').style.width = '80%', 100);
}

updateTime();
setInterval(updateTime, 1000);
</script>
</body>
</html>
