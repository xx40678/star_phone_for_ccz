<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>star.phone v2 - teat</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg:#0b0b10;
  --glass:rgba(255,255,255,0.06);
  --text:#fff;
  --sub:#9aa0aa;
  --accent:#9b5cff;
}
body{
  margin:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;
  font-family:-apple-system,BlinkMacSystemFont;
}
.phone{
  width:360px;height:720px;background:var(--bg);border-radius:40px;overflow:hidden;position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,.7);
}
.screen{
  position:absolute;
  inset:0;           /* 強制填滿 */
  padding:0;         /* 移除 padding */
  margin:0;
}
.hidden{display:none}
.time{font-size:64px;font-weight:600;}
.date{color:var(--sub);}
.app-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.app{text-align:center;font-size:12px;color:#fff;cursor:pointer;}
.icon{
  width:60px;height:60px;border-radius:18px;background:var(--glass);
  display:flex;align-items:center;justify-content:center;margin:auto;font-size:22px;
}
.app-window{
  position:absolute;inset:0;background:var(--bg);
  transform:scale(.95);opacity:0;transition:.25s;
}
.app-window.active{transform:scale(1);opacity:1;}
.header{display:flex;justify-content:space-between;margin-bottom:10px;}
.btn{
  background:var(--glass);border:none;color:#fff;padding:6px 10px;border-radius:10px;
}
.chat{
  display:flex;flex-direction:column;gap:8px;
  overflow-y:auto;
  height:calc(100% - 120px);
}
.bubble{
  max-width:70%;padding:8px;border-radius:12px;font-size:13px;
}
.me{background:var(--accent);align-self:flex-end;}
.you{background:#333;align-self:flex-start;}
</style>
</head>
<body>
<div class="phone">

  <!-- 鎖屏 -->
<div id="lock" class="screen" style="display:flex; flex-direction:column; justify-content:center; align-items:center; cursor:pointer;">
  <div class="time" id="time"></div>
  <div class="date" id="date"></div>
  
  <div style="margin: 60px 0; color: #ccc; font-size: 18px; text-align: center; max-width: 80%;">
    「你不在，我其實也不太想解鎖。」
  </div>
  
  <div style="margin-top: auto; margin-bottom: 80px; color: var(--sub); font-size: 14px; opacity: 0.8; text-align: center;">
    點擊任何地方解鎖 <i class="fa-solid fa-hand-pointer" style="margin-left: 6px;"></i>
  </div>
</div>

  <!-- 主畫面 -->
  <div id="home" class="screen hidden">
    <div class="app-grid" id="apps"></div>
  </div>

  <!-- Messages -->
  <div id="messages" class="app-window screen">
    <div class="header">
      <button class="btn">返回</button>
      <div>ccz</div>
    </div>
    <div id="chat" class="chat"></div>
    <div style="margin-top:10px">
      <input style="width:100%;background:#111;border:none;color:#fff;padding:8px;border-radius:10px" placeholder="輸入訊息…（她不一定會回）">
    </div>
  </div>

  <!-- Love App -->
  <div id="love" class="app-window screen">
    <div class="header">
      <button class="btn">返回</button>
      <div>Relationship</div>
    </div>
    <div id="loveContent"></div>
  </div>
</div>

<script>
// ==================== 最終修正版 ====================

function updateTime() {
    const timeEl = document.getElementById('time');
    if (timeEl) {
        const d = new Date();
        timeEl.innerText = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }
}

function openApp(id) {
    console.log("📱 點擊開啟:", id);
    document.querySelectorAll(".app-window").forEach(a => a.classList.remove("active"));
    const target = document.getElementById(id);
    if (target) target.classList.add("active");

    if (id === "messages") renderChat();
    if (id === "love") renderLove();
}

function closeApp() {
    console.log("🔙 執行 closeApp");
    document.querySelectorAll(".app-window").forEach(a => a.classList.remove("active"));
}

function renderChat() {
    const chat = document.getElementById("chat");
    if (chat) {
        chat.innerHTML = `
            <div class="bubble you">今天有好好吃飯嗎</div>
            <div class="bubble me">…有</div>
            <div class="bubble me">別管那麼多</div>
            <div class="bubble you">你在生氣？</div>
        `;
    }
}

function renderLove() {
    const el = document.getElementById("loveContent");
    if (el) {
        el.innerHTML = `
            關係強度：80%<br><br>
            狀態評價：還行<br><br>
            備註：<br>「你如果再晚睡，我不保證我還會這麼冷靜。」
        `;
    }
}

// ==================== 初始化 ====================
window.onload = function() {
    console.log("✅ onload 執行成功");

    // 鎖屏點擊
    const lock = document.getElementById('lock');
    if (lock) lock.addEventListener('click', () => {
        console.log("🖱️ 點擊解鎖");
        const home = document.getElementById('home');
        lock.style.transition = 'all 0.6s ease';
        lock.style.opacity = '0';
        setTimeout(() => {
            lock.classList.add("hidden");
            home.classList.remove("hidden");
        }, 400);
    });

    // 主畫面 App（加強置中）
    const grid = document.getElementById("apps");
    if (grid) {
        grid.style.display = "grid";
        grid.style.placeItems = "center";
        grid.innerHTML = `
            <div class="app" id="appMsg">
                <div class="icon"><i class="fa-solid fa-comment"></i></div>messages
            </div>
            <div class="app" id="appLove">
                <div class="icon"><i class="fa-solid fa-heart"></i></div>love
            </div>
        `;

        document.getElementById("appMsg").addEventListener("click", () => openApp("messages"));
        document.getElementById("appLove").addEventListener("click", () => openApp("love"));
    }

    // 返回按鈕
    document.querySelectorAll('.btn').forEach(btn => {
        if (btn.innerText.includes('返回')) {
            btn.addEventListener('click', closeApp);
        }
    });

    // 時間
    updateTime();
    setInterval(updateTime, 1000);

    console.log("✅ 所有功能初始化完成");
};
</script>
</body>
</html>
