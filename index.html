<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>iPhone Pro Elite - v19 Photos</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --ios-wallpaper: radial-gradient(circle at center, #2c2c2e 0%, #000000 100%);
  --ios-dark-glass: rgba(25, 25, 25, 0.7);
  --accent: #0A84FF;
  --ios-blur: blur(30px) saturate(190%);
  --border-glass: 0.5px solid rgba(255, 255, 255, 0.15);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

body {
  margin: 0; padding: 0; background: #0a0a0a; 
  display: flex; justify-content: center; align-items: center; 
  min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
  overflow: hidden;
}

.phone {
  width: 375px; height: 812px; background: #000; border-radius: 55px; 
  position: relative; overflow: hidden; border: 12px solid #1c1c1e;
  box-shadow: 0 50px 100px rgba(0,0,0,0.9);
}

.status-bar { position: absolute; top: 0; width: 100%; height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 32px; z-index: 10000; color: #fff; font-size: 14px; }
.notch { width: 160px; height: 30px; background: #1c1c1e; position: absolute; top: 0; left: 50%; transform: translateX(-50%); border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; z-index: 10001; }

/* 鎖屏與主畫面 */
#lock-screen { position: absolute; inset: 0; z-index: 9000; background: var(--ios-wallpaper); display: flex; flex-direction: column; align-items: center; padding-top: 100px; transition: 0.7s cubic-bezier(0.45, 0, 0.15, 1); }
.lock-time { font-size: 88px; font-weight: 200; color: #fff; letter-spacing: -3px; }
.lock-widget { margin-top: 30px; background: rgba(255, 255, 255, 0.1); padding: 12px 24px; border-radius: 16px; backdrop-filter: blur(15px); color: #fff; font-size: 14px; border: var(--border-glass); }
#home-screen { position: absolute; inset: 0; z-index: 100; padding: 60px 25px; background: var(--ios-wallpaper); }
.app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
.app { text-align: center; color: #fff; cursor: pointer; }
.icon { width: 62px; height: 62px; border-radius: 15px; background: rgba(30, 30, 30, 0.8); display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; font-size: 32px; border: var(--border-glass); }
.dock { position: absolute; bottom: 25px; left: 15px; right: 15px; height: 96px; background: rgba(255, 255, 255, 0.22); backdrop-filter: var(--ios-blur); border-radius: 38px; display: flex; justify-content: space-evenly; align-items: center; border: var(--border-glass); }

/* App 視窗 */
.app-window { position: absolute; inset: 0; z-index: 1500; background: #000; display: none; flex-direction: column; opacity: 0; transform: translateY(30px) scale(0.95); transition: 0.4s cubic-bezier(0.1, 0.8, 0.2, 1); }
.app-window.active { display: flex; opacity: 1; transform: translateY(0) scale(1); }
.header { padding: 50px 20px 15px; background: var(--ios-dark-glass); backdrop-filter: var(--ios-blur); display: flex; align-items: center; border-bottom: 0.5px solid rgba(255,255,255,0.1); z-index: 10; }
.header-title { flex: 1; text-align: center; color: #fff; font-weight: 600; font-size: 17px; }

/* 相簿排版 */
.photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; padding: 2px; flex: 1; overflow-y: auto; }
.photo-thumb { aspect-ratio: 1/1; background: #1c1c1e; border: 0.5px solid #000; display: flex; align-items: center; justify-content: center; padding: 10px; cursor: pointer; overflow: hidden; }
.photo-thumb span { color: #8e8e93; font-size: 12px; text-align: center; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

/* 全螢幕照片檢視 */
.photo-viewer { position: absolute; inset: 0; background: #000; z-index: 2000; display: none; flex-direction: column; }
.photo-viewer.active { display: flex; }
.viewer-content { flex: 1; display: flex; align-items: center; justify-content: center; padding: 30px; color: #fff; font-size: 18px; line-height: 1.6; white-space: pre-wrap; text-align: center; }

/* 其他 App 樣式 */
.chat-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #000; }
.bubble { max-width: 75%; padding: 10px 16px; border-radius: 20px; color: #fff; font-size: 16px; line-height: 1.4; word-wrap: break-word; }
.me { background: var(--accent); align-self: flex-end; border-bottom-right-radius: 4px; }
.you { background: #262629; align-self: flex-start; border-bottom-left-radius: 4px; }
.list-item { padding: 18px 20px; display: flex; align-items: center; border-bottom: 0.5px solid #1c1c1e; color: #fff; cursor: pointer; }

/* 彈窗 */
.custom-alert { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.85); width: 280px; background: rgba(35, 35, 35, 0.85); backdrop-filter: var(--ios-blur); border-radius: 16px; display: none; flex-direction: column; z-index: 10000; opacity: 0; transition: 0.3s; border: var(--border-glass); }
.custom-alert.active { display: flex; opacity: 1; transform: translate(-50%, -50%) scale(1); }
.alert-btn { padding: 16px; color: var(--accent); text-align: center; border-top: 0.5px solid rgba(255,255,255,0.1); cursor: pointer; font-weight: 600; font-size: 17px; }
.home-bar { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 135px; height: 5px; background: #fff; border-radius: 10px; opacity: 0.5; z-index: 10000; }
.reply-menu { position: absolute; bottom: 100px; left: 15px; right: 15px; background: rgba(44, 44, 46, 0.95); backdrop-filter: blur(20px); border-radius: 14px; display: none; flex-direction: column; z-index: 3000; border: var(--border-glass); }
.reply-menu.show { display: flex; }
.menu-item { padding: 16px; color: var(--accent); text-align: center; border-bottom: 0.5px solid rgba(255,255,255,0.1); cursor: pointer; }
</style>
</head>
<body onclick="hideReplyMenu()">

<div class="phone">
  <div class="notch"></div>
  <div class="status-bar">
    <div id="status-time">16:20</div>
    <div style="display:flex; gap:5px;"><i class="fas fa-signal"></i> <i class="fas fa-wifi"></i> <i class="fas fa-battery-full"></i></div>
  </div>

  <div id="lock-screen" onclick="unlock()">
    <div class="lock-time" id="lock-time">16:20</div>
    <div style="font-size:22px; color:rgba(255,255,255,0.9); margin-top:-5px;">3月24日 星期二</div>
    <div class="lock-widget"><i class="fas fa-heart" style="color:#ff2d55; margin-right:8px;"></i> 你不在，我其實也不太想解鎖。</div>
    <div style="margin-top:auto; margin-bottom:65px; color:rgba(255,255,255,0.5); font-size:15px;">向上滑動以解鎖</div>
  </div>

  <div id="home-screen">
    <div class="app-grid">
      <div class="app" onclick="openApp('msg-list')"><div class="icon" style="color:#4cd964;"><i class="fas fa-comment"></i></div><span>訊息</span></div>
      <div class="app" onclick="openApp('love-app')"><div class="icon" style="color:#ff3b30;"><i class="fas fa-heart"></i></div><span>關係</span></div>
    </div>
    <div class="dock">
        <div class="app" onclick="openApp('phone-app')"><div class="icon" style="color:#32D74B;"><i class="fas fa-phone"></i></div></div>
        <div class="app" onclick="openApp('search-app')"><div class="icon" style="color:#5AC8FA;"><i class="fas fa-compass"></i></div></div>
        <div class="app" onclick="openApp('photos-app')"><div class="icon" style="background:linear-gradient(135deg, #ff3b30, #ff9500, #ffcc00, #4cd964, #5ac8fa, #007aff, #5856d6);"><i class="fas fa-image" style="color:#fff; font-size:24px;"></i></div></div>
        <div class="app"><div class="icon" style="color:#A2845E;"><i class="fas fa-music"></i></div></div>
    </div>
  </div>

  <div id="photos-app" class="app-window">
    <div class="header">
        <i class="fas fa-chevron-left" style="color:var(--accent); cursor:pointer" onclick="closeApp()"></i>
        <div class="header-title">照片</div>
    </div>
    <div class="photo-grid">
        <div class="photo-thumb" onclick="viewPhoto('ccz與她妹妹的自拍照，帶了毛帽，很可愛')"><span>ccz與她妹妹</span></div>
        <div class="photo-thumb" onclick="viewPhoto('那天在網上散步看到了可愛貓咪\n\n　　　　　  ＿＿\n　　　　　／＞　　フ\n　　　　　|  　_　 _ l\n　 　　　／` ミ＿꒳ノ\n　　 　 /　　　 　 |\n　　　 /　 ヽ、..')"><span>路邊看到的貓咪</span></div>
        <div class="photo-thumb" onclick="viewPhoto('好想一起去看海')"><span>海</span></div>
    </div>
  </div>

  <div id="photo-viewer" class="photo-viewer">
    <div class="header" style="background:transparent; border:none;">
        <i class="fas fa-chevron-left" style="color:#fff; cursor:pointer" onclick="closePhoto()"></i>
    </div>
    <div class="viewer-content" id="viewer-text"></div>
  </div>

  <div id="msg-list" class="app-window">
    <div class="header"><i class="fas fa-chevron-left" style="color:var(--accent); cursor:pointer" onclick="closeApp()"></i><div class="header-title">訊息</div></div>
    <div class="list-item" onclick="openApp('chat-ccz')">
        <div style="flex:1; color:#fff;"><span style="font-weight:600;">ccz</span><div style="color:#8e8e93; font-size:14px;">你在生氣？</div></div>
    </div>
  </div>

  <div id="chat-ccz" class="app-window">
    <div class="header"><i class="fas fa-chevron-left" style="color:var(--accent); cursor:pointer" onclick="openApp('msg-list')"></i><div class="header-title">ccz</div></div>
    <div class="chat-body" id="chat-box-ccz">
        <div class="bubble you">今天有好好吃飯嗎？</div>
        <div class="bubble me">…有</div>
        <div class="bubble you">你在生氣？</div>
    </div>
    <div id="reply-menu" class="reply-menu">
        <div class="menu-item" onclick="sendReply('怎麼會對你生氣', '乖乖等我回家')">怎麼會對你生氣</div>
        <div class="menu-item" onclick="sendReply('哪有', '憋死你算了')">哪有</div>
    </div>
    <div style="padding:15px 15px 45px; background:#000; border-top: 0.5px solid #1c1c1e;">
        <div onclick="toggleReply(event)" style="background:#1c1c1e; border-radius:22px; padding:10px 18px; color:#8e8e93; border: 1px solid #333; cursor:pointer;">iMessage</div>
    </div>
  </div>

  <div id="search-app" class="app-window">
    <div class="header"><i class="fas fa-chevron-left" style="color:var(--accent); cursor:pointer" onclick="closeApp()"></i><div class="header-title">Safari</div></div>
    <div style="padding:15px; overflow-y:auto; flex:1;">
        <div class="list-item" onclick="showAlert('不知道女生都喜歡什麼顏色')">女生喜歡的口紅色號</div>
    </div>
  </div>

  <div id="phone-app" class="app-window">
    <div class="header"><i class="fas fa-chevron-left" style="color:var(--accent); cursor:pointer" onclick="closeApp()"></i><div class="header-title">聯絡人</div></div>
    <div class="list-item" onclick="showAlert('不知道你現在在幹嘛?')"><span style="font-weight:600;">ccz</span></div>
  </div>

  <div id="love-app" class="app-window">
    <div class="header"><i class="fas fa-chevron-left" style="color:var(--accent); cursor:pointer" onclick="closeApp()"></i><div class="header-title">Relationship</div></div>
    <div id="love-content" style="padding:25px;"></div>
  </div>

  <div id="alert-box" class="custom-alert">
    <div id="alert-msg" style="padding:22px; color:#fff; text-align:center;"></div>
    <div class="alert-btn" onclick="closeAlert()">好</div>
  </div>

  <div class="home-bar"></div>
</div>

<script>
function updateTime() {
    const d = new Date();
    const t = d.toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit', hour12:false});
    document.querySelectorAll('#status-time, #lock-time').forEach(el => el.innerText = t);
}
function unlock() {
    const s = document.getElementById('lock-screen');
    s.style.transform = 'translateY(-100%)'; s.style.opacity = '0';
    setTimeout(() => s.style.display = 'none', 700);
}
function openApp(id) {
    document.querySelectorAll('.app-window').forEach(w => w.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 'love-app') renderLove();
}
function closeApp() { document.querySelectorAll('.app-window').forEach(w => w.classList.remove('active')); }

// 照片檢視邏輯
function viewPhoto(txt) {
    document.getElementById('viewer-text').innerText = txt;
    document.getElementById('photo-viewer').classList.add('active');
}
function closePhoto() {
    document.getElementById('photo-viewer').classList.remove('active');
}

function toggleReply(e) { e.stopPropagation(); document.getElementById('reply-menu').classList.toggle('show'); }
function hideReplyMenu() { document.getElementById('reply-menu').classList.remove('show'); }
function sendReply(me, you) {
    const box = document.getElementById('chat-box-ccz');
    box.innerHTML += `<div class="bubble me">${me}</div>`;
    hideReplyMenu();
    setTimeout(() => {
        box.innerHTML += `<div class="bubble you">${you}</div>`;
        box.scrollTop = box.scrollHeight;
    }, 1000);
}
function showAlert(txt) {
    document.getElementById('alert-msg').innerText = txt;
    document.getElementById('alert-box').style.display = 'flex';
    setTimeout(() => document.getElementById('alert-box').classList.add('active'), 10);
}
function closeAlert() {
    document.getElementById('alert-box').classList.remove('active');
    setTimeout(() => document.getElementById('alert-box').style.display = 'none', 300);
}
function renderLove() {
    const el = document.getElementById("love-content");
    el.innerHTML = `<div style="background:rgba(28,28,30,0.8); padding:25px; border-radius:22px; border:var(--border-glass);">
        <div style="color:#8e8e93; font-size:13px; margin-bottom:12px;">目前關係強度</div>
        <div style="font-size:42px; font-weight:800; color:#fff; margin-bottom:18px;">80%</div>
        <div style="height:12px; background:rgba(255,255,255,0.1); border-radius:10px; overflow:hidden">
            <div id="love-pbar" style="width:0%; height:100%; background:linear-gradient(90deg, #ff2d55, #ff5e5e); transition: 1.8s;"></div>
        </div>
    </div>`;
    setTimeout(() => { if(document.getElementById('love-pbar')) document.getElementById('love-pbar').style.width = '80%'; }, 200);
}
updateTime();
setInterval(updateTime, 1000);
</script>
</body>
</html>
