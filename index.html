<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>iPhone Omni-Fix Edition</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --ios-bg: radial-gradient(circle at center, #1c1c1e 0%, #000 100%);
  --ios-blue: #0A84FF;
  --glass: rgba(255, 255, 255, 0.12);
  --blur: blur(30px) saturate(180%);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }

.phone { width: 100vw; height: 100dvh; max-width: 375px; max-height: 812px; background: #000; border-radius: 55px; position: relative; overflow: hidden; border: 12px solid #1c1c1e; }

/* 狀態欄與 Notch */
.status-bar { position: absolute; top: 0; width: 100%; height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 32px; z-index: 5000; color: #fff; font-size: 14px; }
.notch { width: 160px; height: 30px; background: #1c1c1e; position: absolute; top: 0; left: 50%; transform: translateX(-50%); border-radius: 0 0 20px 20px; z-index: 5001; }

/* 鎖屏 */
#lock-screen { position: absolute; inset: 0; z-index: 4500; background: var(--ios-bg); display: flex; flex-direction: column; align-items: center; padding-top: 100px; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
.lock-time { font-size: 80px; font-weight: 200; color: #fff; }
.lock-date { font-size: 22px; font-weight: 600; color: #fff; margin-top: 5px; }

/* 主畫面 UI */
#home-screen { position: absolute; inset: 0; padding: 60px 20px; background: var(--ios-bg); z-index: 100; overflow-y: auto; }
.widget-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
.widget { background: var(--glass); backdrop-filter: var(--blur); border-radius: 22px; height: 155px; padding: 15px; color: #fff; border: 0.5px solid rgba(255,255,255,0.1); }
.app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 10px; }
.app { text-align: center; color: #fff; cursor: pointer; font-size: 11px; }
.icon { width: 60px; height: 60px; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 6px; font-size: 28px; background: #2c2c2e; border: 0.5px solid rgba(255,255,255,0.1); }
.dock { position: absolute; bottom: 25px; left: 15px; right: 15px; height: 92px; background: rgba(255, 255, 255, 0.15); backdrop-filter: var(--blur); border-radius: 35px; display: flex; justify-content: space-evenly; align-items: center; z-index: 1000; }

/* 視窗與對話 */
.app-window { position: absolute; inset: 0; z-index: 1500; background: #000; display: none; flex-direction: column; }
.app-window.active { display: flex; }
.chat-header { padding: 50px 15px 15px; background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(20px); display: flex; align-items: center; border-bottom: 0.5px solid #333; }
.chat-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
.bubble { max-width: 78%; padding: 12px 16px; border-radius: 20px; color: #fff; font-size: 16px; line-height: 1.4; }
.you { background: #262629; align-self: flex-start; border-bottom-left-radius: 4px; }
.me { background: var(--ios-blue); align-self: flex-end; border-bottom-right-radius: 4px; }

.options-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(28, 28, 30, 0.98); padding: 20px 20px 45px; border-radius: 30px 30px 0 0; display: none; flex-direction: column; gap: 10px; z-index: 6000; }
.option-btn { background: rgba(255,255,255,0.1); padding: 16px; border-radius: 15px; color: #fff; text-align: center; cursor: pointer; border: 0.5px solid rgba(255,255,255,0.1); }
.home-bar { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 135px; height: 5px; background: #fff; border-radius: 10px; opacity: 0.5; z-index: 7000; cursor: pointer; }
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>
  <div class="status-bar"><div id="status-time">12:00</div><div><i class="fas fa-signal"></i> <i class="fas fa-wifi"></i> <i class="fas fa-battery-full"></i></div></div>

  <div id="lock-screen" onclick="this.style.transform='translateY(-100%)'">
    <div id="lock-time-display" class="lock-time">12:00</div>
    <div class="lock-date">3月28日 星期六</div>
    <div style="margin-top:40px; color:rgba(255,255,255,0.6); font-size:14px;"><i class="fas fa-lock"></i> 向上滑動以解鎖</div>
  </div>

  <div id="home-screen">
    <div class="widget-row">
      <div class="widget" style="background: linear-gradient(135deg, #1d1d1f, #2c2c2e);">
        <div style="font-size:12px; opacity:0.6; margin-bottom:10px;">備忘錄</div>
        <div style="font-size:16px;">જ⁀➴感覺至上<br>-ˋˏ ♡ ˎˊ-</div>
      </div>
      <div class="widget" style="background:#fff; color:#000;">
        <div style="font-size:12px; color:red; font-weight:bold;">星期六</div>
        <div style="font-size:45px; font-weight:200;">28</div>
      </div>
    </div>
    <div class="app-grid">
      <div class="app"><div class="icon" style="background:#ff9500;"><i class="fas fa-calculator"></i></div><span>計算機</span></div>
      <div class="app" onclick="openApp('ig-app')"><div class="icon" style="background:linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);"><i class="fab fa-instagram"></i></div><span>Instagram</span></div>
      <div class="app"><div class="icon" style="background:#1c1c1e;"><i class="fas fa-cog"></i></div><span>設定</span></div>
      <div class="app"><div class="icon" style="background:#ff3b30;"><i class="fas fa-music"></i></div><span>音樂</span></div>
    </div>
    <div class="dock">
      <div class="app"><div class="icon" style="background:#34c759; margin:0;"><i class="fas fa-phone"></i></div></div>
      <div class="app" onclick="openApp('safari-app')"><div class="icon" style="background:#fff; margin:0;"><i class="fas fa-compass" style="color:#0A84FF;"></i></div></div>
      <div class="app" onclick="openApp('messages-app')"><div class="icon" style="background:#34c759; margin:0;"><i class="fas fa-comment"></i></div></div>
      <div class="app"><div class="icon" style="background:#fff; margin:0;"><i class="fas fa-images" style="color:#ff2d55;"></i></div></div>
    </div>
  </div>

  <div id="messages-app" class="app-window">
    <div style="padding: 65px 20px 10px; font-size: 34px; font-weight: 700; color: #fff;">訊息</div>
    <div style="display:flex; align-items:center; padding:15px 20px; border-bottom:0.5px solid #222;" onclick="openChat()">
      <div style="width:50px; height:50px; background:#333; border-radius:50%; margin-right:15px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:20px;">延</div>
      <div style="flex:1;"><div style="color:#fff; font-weight:600;">予延</div><div id="last-msg" style="color:#8e8e93; font-size:14px;">點擊開啟...</div></div>
    </div>
  </div>

  <div id="chat-detail" class="app-window">
    <div class="chat-header">
        <div onclick="closeChat()" style="color:var(--ios-blue); font-size:17px; cursor:pointer;"><i class="fas fa-chevron-left"></i> 訊息</div>
        <div style="flex:1; text-align:center; color:#fff; font-weight:600; margin-right:60px;">予延</div>
    </div>
    <div class="chat-body" id="chat-box"></div>
    <div style="padding: 15px 15px 45px; background: #000;"><div onclick="showOptions()" style="background:#1c1c1e; border-radius:22px; padding:12px 18px; color:#fff; border: 1px solid #444; text-align:center;">回覆...</div></div>
  </div>

  <div id="safari-app" class="app-window">
    <div style="padding: 65px 20px 10px; font-size: 34px; font-weight: 700; color: #fff;">Safari</div>
    <div style="padding:20px; color:#fff;">
      <div style="padding:15px; border-bottom:1px solid #333;">台北拉麵推薦 蘆洲</div>
      <div style="padding:15px; border-bottom:1px solid #333;">Apex 腳步聲設定</div>
      <div style="padding:15px; border-bottom:1px solid #333;">網咖包廂價目表</div>
    </div>
  </div>

  <div id="options" class="options-overlay"></div>
  <div class="home-bar" onclick="goHome()"></div>
</div>

<script>
function updateClock() {
    const now = new Date();
    const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    document.getElementById('status-time').innerText = timeStr;
    document.getElementById('lock-time-display').innerText = timeStr;
}
setInterval(updateClock, 1000); updateClock();

let currentKey = '';
const gameData = {
    'morning': { msg: "早。怎麼這時間醒著？", options: [
        { text: "就剛好醒了。你呢？", next: 'm_1' },
        { text: "餓醒的，想吃拉麵。", next: 'm_2' },
        { text: "在等某個高冷帥哥回訊息啊。", next: 'm_3' }
    ]},
    'm_1': { msg: "剛醒。順路帶妳去吃早午餐？", options: [
        { text: "好啊，你載我？", next: 'm_1_a' },
        { text: "你要來接我嗎？", next: 'm_1_b' }
    ]},
    'm_1_a': { msg: "不然妳想走路？十五分鐘後門口見。", options: [{ text: "好，等我。", next: 'end_brunch' }] },
    'm_1_b': { msg: "順路而已。別想太多。", options: [{ text: "知道了啦。", next: 'end_brunch' }] },
    'm_2': { msg: "早上吃拉麵太鹹。帶妳去喝熱豆漿？", options: [{ text: "好，聽你的。", next: 'end_warm' }, { text: "我要吃那家有名的。", next: 'end_warm' }] },
    'm_3': { msg: "現在回了。快去睡，黑眼圈都要掉到地上了。", options: [{ text: "哪有這麼誇張！", next: 'end_sleep' }, { text: "下午見。", next: 'end_sleep' }] },

    'afternoon': { msg: "在忙。妳沒在偷懶吧？", options: [
        { text: "在研究 Apex 設定。", next: 'a_1' },
        { text: "在找網咖包廂。", next: 'a_2' }
    ]},
    'a_1': { msg: "妳那槍法研究也沒用。下班我帶妳去網咖練？", options: [{ text: "好啊，你訂位？", next: 'end_cyber' }, { text: "我沒那麼爛吧！", next: 'end_cyber' }] },
    'a_2': { msg: "找包廂幹嘛？想打遊戲？我知道一家環境不錯。", options: [{ text: "要去嗎？", next: 'end_cyber' }, { text: "載我？", next: 'end_cyber' }] },

    'evening': { msg: "下班了嗎？我剛好在附近。", options: [
        { text: "又是順路？", next: 'e_1' },
        { text: "想吃拉麵。", next: 'e_2' }
    ]},
    'e_1': { msg: "不然呢？快上車，這裡不能久停。", options: [{ text: "這就下去。", next: 'end_pickup' }, { text: "等我一分鐘。", next: 'end_pickup' }] },
    'e_2': { msg: "妳搜的那家排隊很長。不過我可以陪妳。", options: [{ text: "真的？走！", next: 'end_ramen' }] },

    'night': { msg: "......妳還沒睡？", options: [
        { text: "你不也醒著。在想誰？", next: 'n_1' },
        { text: "在想你今天說的話。", next: 'n_2' }
    ]},
    'n_1': { msg: "想一個半夜不睡覺、還在跟我鬧脾氣的笨蛋。", options: [{ text: "說誰笨蛋呢！", next: 'n_1_a' }, { text: "笨蛋也想你了。", next: 'end_tomorrow' }] },
    'n_1_a': { msg: "說妳。看窗外，我在妳家樓下。", options: [{ text: "天啊你瘋了！", next: 'end_midnight' }, { text: "憋死你算了，不下去。", next: 'end_midnight' }] },
    'n_2': { msg: "別想了。去睡覺，晚安。", options: [{ text: "憋死你算了，晚安。", next: 'end_tomorrow' }] },

    'end_brunch': { msg: "我快到了。門口等。", options: [] },
    'end_warm': { msg: "吃完記得拍給我看。下午見。", options: [] },
    'end_sleep': { msg: "知道了。晚安。", options: [] },
    'end_cyber': { msg: "包廂訂好了，我有帶外套。到了敲妳。", options: [] },
    'end_ramen': { msg: "看到妳了。這裡。", options: [] },
    'end_pickup': { msg: "上車。想聽什麼音樂自己連。", options: [] },
    'end_tomorrow': { msg: "晚安。明天見。", options: [] },
    'end_midnight': { msg: "別看了，快下來。外面冷。", options: [] }
};

function openApp(id) { document.getElementById(id).classList.add('active'); }
function goHome() { document.querySelectorAll('.app-window').forEach(el=>el.classList.remove('active')); }
function closeChat() { document.getElementById('chat-detail').classList.remove('active'); }

function openChat() { 
    const box = document.getElementById('chat-box');
    document.getElementById('chat-detail').classList.add('active');
    if (box.innerHTML === "") {
        const hr = new Date().getHours();
        let start = (hr>=5&&hr<11)?'morning':(hr>=11&&hr<17)?'afternoon':(hr>=17&&hr<22)?'evening':'night';
        currentKey = start;
        box.innerHTML = `<div class="bubble you">${gameData[start].msg}</div>`;
    }
}

function showOptions() {
    const data = gameData[currentKey];
    const overlay = document.getElementById('options');
    const box = document.getElementById('chat-box');
    if (!data || !data.options || data.options.length === 0) return;
    overlay.innerHTML = '';
    data.options.forEach(opt => {
        const btn = document.createElement('div'); btn.className = 'option-btn';
        btn.innerText = opt.text;
        btn.onclick = () => {
            overlay.style.display = 'none';
            box.innerHTML += `<div class="bubble me">${opt.text}</div>`;
            currentKey = opt.next;
            setTimeout(() => {
                const node = gameData[currentKey];
                if(node) {
                    box.innerHTML += `<div class="bubble you">${node.msg}</div>`;
                    document.getElementById('last-msg').innerText = node.msg;
                    box.scrollTop = box.scrollHeight;
                }
            }, 800);
        };
        overlay.appendChild(btn);
    });
    overlay.style.display = 'flex';
}
</script>
</body>
</html>
