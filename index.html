<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iPhone Dark Mode - star.phone v4</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg: #000;
  --card-bg: #1c1c1e;
  --glass: rgba(255, 255, 255, 0.1);
  --text: #fff;
  --sub: #8e8e93;
  --accent: #0A84FF; /* iOS Dark Mode Blue */
  --ios-blur: blur(25px);
}
body{
  margin:0; background:#121212; display:flex; justify-content:center; align-items:center; height:100vh;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
}

/* iPhone 外殼 */
.phone{
  width:375px; height:812px; 
  /* 灰色漸層桌布 */
  background: linear-gradient(135deg, #434343 0%, #000000 100%);
  border-radius:55px; overflow:hidden; position:relative;
  box-shadow:0 50px 100px rgba(0,0,0,0.8);
  border: 12px solid #2c2c2e;
}

/* 頂部狀態列 */
.status-bar {
  position: absolute; top: 0; width: 100%; height: 44px;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 30px; box-sizing: border-box; z-index: 1000; color: #fff; font-size: 14px; font-weight: 600;
}
.notch {
  width: 160px; height: 30px; background: #2c2c2e; position: absolute; top: 0; left: 50%;
  transform: translateX(-50%); border-bottom-left-radius: 20px; border-bottom-right-radius: 20px;
}

/* 底部操作條 */
.home-indicator {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  width: 120px; height: 5px; background: #fff; border-radius: 10px; z-index: 1000; opacity: 0.5;
}

.screen{position:absolute; inset:0; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;}
.hidden{display:none !important;}

/* 鎖屏介面 */
#lock {
  display: flex; flex-direction: column; align-items: center; justify-content: space-between;
  padding: 100px 20px 120px; box-sizing: border-box; z-index: 500;
  background: rgba(0,0,0,0.2);
}
.lock-time { font-size: 80px; font-weight: 200; color: #fff; }
.lock-date { font-size: 22px; margin-top: -10px; color: #fff; }

/* 主畫面排版 */
#home { padding: 60px 25px; box-sizing: border-box; }
.app-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px 20px;
}
.app { text-align: center; cursor: pointer; transition: transform 0.2s; }
.app:active { transform: scale(0.9); }
.icon {
  width: 60px; height: 60px; border-radius: 14px; background: var(--glass);
  display: flex; align-items: center; justify-content: center; margin-bottom: 6px;
  font-size: 30px; backdrop-filter: var(--ios-blur);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.05);
}
.app span { color: #fff; font-size: 12px; font-weight: 500; letter-spacing: 0.5px; }

/* iOS Dock 欄 */
.dock {
  position: absolute; bottom: 30px; left: 15px; right: 15px; height: 90px;
  background: rgba(255,255,255,0.1); backdrop-filter: var(--ios-blur);
  border-radius: 35px; display: flex; justify-content: space-evenly; align-items: center;
  border: 1px solid rgba(255,255,255,0.05);
}

/* App 視窗 */
.app-window {
  position: absolute; inset: 0; background: #000;
  transform: scale(0.9); opacity: 0; transition: 0.4s cubic-bezier(0.1, 0.7, 0.1, 1);
  pointer-events: none; z-index: 800; display: flex; flex-direction: column;
}
.app-window.active { transform: scale(1); opacity: 1; pointer-events: auto; }

/* 聊天與標頭 */
.chat-header {
  padding: 50px 20px 15px; background: rgba(28,28,30,0.8); backdrop-filter: var(--ios-blur);
  display: flex; align-items: center; border-bottom: 0.5px solid #333;
}
.chat-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
.bubble { max-width: 75%; padding: 10px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; }
.me { background: var(--accent); align-self: flex-end; color: #fff; border-bottom-right-radius: 4px; }
.you { background: #3a3a3c; align-self: flex-start; color: #fff; border-bottom-left-radius: 4px; }
