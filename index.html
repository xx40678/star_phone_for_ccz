<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>iPhone Perfect Setup</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --ios-wallpaper: radial-gradient(circle at center, #1c1c1e 0%, #000000 100%);
  --ios-blur: blur(30px) saturate(190%);
  --border-glass: 0.5px solid rgba(255, 255, 255, 0.1);
  --ios-blue: #0A84FF;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }

.phone { width: 100vw; height: 100dvh; max-width: 375px; max-height: 812px; background: #000; border-radius: 55px; position: relative; overflow: hidden; border: 12px solid #1c1c1e; }
.status-bar { position: absolute; top: 0; width: 100%; height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 32px; z-index: 4000; color: #fff; font-size: 14px; }
.system-back { position: absolute; top: 44px; left: 20px; z-index: 4000; color: var(--ios-blue); font-size: 12px; display: none; align-items: center; cursor: pointer; }
.notch { width: 160px; height: 30px; background: #1c1c1e; position: absolute; top: 0; left: 50%; transform: translateX(-50%); border-radius: 0 0 20px 20px; z-index: 4001; }

/* 介面切換 */
#lock-screen { position: absolute; inset: 0; z-index: 3500; background: var(--ios-wallpaper); display: flex; flex-direction: column; align-items: center; padding-top: 100px; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
#home-screen { position: absolute; inset: 0; padding: 60px 25px; background: var(--ios-wallpaper); display: flex; flex-direction: column; z-index: 100; }
.app-window { position: absolute; inset: 0; z-index: 1500; background: #000; display: none; flex-direction: column; }
.app-window.active { display: flex; }

/* 聊天室樣式 */
#chat-detail { z-index: 1600; background: #000; transform: translateX(100%); transition: transform 0.3s ease; }
#chat-detail.active { transform: translateX(0); }
.header { padding: 50px 15px 15px; background: rgba(20, 20, 20, 0.9); backdrop-filter: var(--ios-blur); display: flex; align-items: center; border-bottom: 0.5px solid #222; }
.chat-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
.bubble { max-width: 75%; padding: 10px 16px; border-radius: 18px; color: #fff; font-size: 16px; line-height: 1.4; }
.you { background: #262629; align-self: flex-start; border-bottom-left-radius: 4px; }
.me { background: var(--ios-blue); align-self: flex-end; border-bottom-right-radius: 4px; }

/* 元件 */
.home-bar { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 135px; height: 5px; background: #fff; border-radius: 10px; opacity: 0.5; z-index: 5000; cursor: pointer; }
.options-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(28, 28, 30, 0.98); padding: 20px 20px 40px; border-radius: 25px 25px 0 0; display: none; flex-direction: column; gap: 10px; z-index: 4500; }
.option-btn { background: rgba(255,255,255,0.1); padding: 16px; border-radius: 16px; color: #fff; text-align: center; cursor: pointer; }
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>
  <div class="status-bar"><div id="status-time">11:20</div><div><i class="fas fa-signal"></i> <i class="fas fa-wifi"></i> <i class="fas fa-battery-full"></i></div></div>
  <div id="sys-back" class="system-back" onclick="goHome()"><i class="fas fa-chevron-left"></i> 主畫面</div>

  <div id="lock-screen" onclick="this.style.transform='translateY(-100%)'">
    <div class="lock-time" id="lock-time-display">11:20</div>
    <div class="lock-date">3月28日 星期六</div>
    <div style="margin-top:25px; padding:10px 20px; background:rgba(255,255,255,0.08); border-radius:18px; color:#fff; font-size:14px; backdrop-filter:blur(10px); border:var(--border-glass);">જ⁀➴感覺至上 -ˋˏ ♡ ˎˊ-</div>
  </div>

  <div id="home-screen">
    <div class="app-grid" style="margin-top: 180px;">
      <div class="app" onclick="openMessages()"><div class="icon" style="background:#34c759; width:62px; height:62px; border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 8px; font-size:32px;"><i class="fas fa-comment" style="color:#fff;"></i></div><span style="color:#fff; font-size:12px;">訊息</span></div>
    </div>
  </div>

  <div id="messages-app" class="app-window">
    <div style="padding: 60px 20px 10px; font-size: 34px; font-weight: 700; color: #fff;">訊息</div>
    <div style="display:flex; align-items:center; padding:15px 20px; border-bottom:0.5px solid #222; cursor:pointer;" onclick="openChat()">
      <div style="width:50px; height:50px; background:#333; border-radius:50%; margin-right:15px; display:flex; align-items:center; justify-content:center; color:#fff;">延</div>
      <div style="flex:1;">
        <div style="color:#fff; font-weight:600;">予延</div>
        <div id="last-msg" style="color:#8e8e93; font-size:14px;">......妳還沒睡？</div>
      </div>
    </div>
  </div>

  <div id="chat-detail" class="app-window">
    <div class="header">
        <div style="color:var(--ios-blue); cursor:pointer; width:80px;" onclick="closeChat()"><i class="fas fa-chevron-left"></i> 訊息</div>
        <div style="flex:1; text-align:center; color:#fff; font-weight:600; margin-right:80px;">予延</div>
    </div>
    <div class="chat-body" id="chat-box">
        <div class="bubble you" id="init-msg">......妳還沒睡？</div>
    </div>
    <div style="padding: 15px 15px 40px; background: #000;">
        <div id="input-trigger" onclick="showOptions()" style="background:#1c1c1e; border-radius:22px; padding:12px 18px; color:#fff; border: 1px solid #444; text-align: center; cursor:pointer;">回覆予延...</div>
    </div>
  </div>

  <div id="options" class="options-overlay"></div>
  <div class="home-bar" onclick="goHome()"></div>
</div>

<script>
// --- 時間偵測與術語自動替換 ---
function getTimeGreeting() {
    const hour = new Date().getHours();
    if (hour >= 5 && hour < 11) return "早安";
    if (hour >= 11 && hour < 17) return "今天過得還好嗎";
    if (hour >= 17 && hour < 23) return "晚上好";
    return "晚安";
}

function updateClock() {
    const now = new Date();
    const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    document.getElementById('status-time').innerText = timeStr;
    document.getElementById('lock-time-display').innerText = timeStr;
}
setInterval(updateClock, 1000);
updateClock();

// --- 20 層攻略分支數據 ---
let currentKey = 'start';
const gameData = {
    'start': { options: [{ text: "在等你回訊息啊，高冷帥哥。", next: 'l1_a' }, { text: "睡不著。你呢？為什麼還醒著？", next: 'l1_b' }] },
    'l1_a': { msg: "......別亂叫。", options: [{ text: "臉紅了嗎？隔著螢幕真可惜。", next: 'l2_a' }] },
    'l1_b': { msg: "在看妳之前發的那張照片。", options: [{ text: "哪一張？我有發過照片嗎？", next: 'l2_b' }] },
    'l2_a': { msg: "沒紅。快去睡覺。", options: [{ text: "惱羞成怒喔？那我不吵你了。", next: 'l3_a' }] },
    'l2_b': { msg: "這張。妳笑得很傻的那張。", options: [{ text: "哪有傻？那叫開朗好嗎！", next: 'l3_b' }] },
    'l3_a': { msg: "沒說不讓妳吵。隨便妳。", options: [{ text: "那我偏要大吵大鬧，看你理不理我。", next: 'l4_a' }] },
    'l3_b': { msg: "是是是，開朗到全世界都聽得到。", options: [{ text: "你竟然偷偷存我的醜照？", next: 'l4_b' }] },
    'l4_a': { msg: "只要鄰居不報警，我都沒意見。", options: [{ text: "予延，你是不是在嫌我吵？", next: 'l5_a' }] },
    'l4_b': { msg: "沒偷偷，是正大光明看的。", options: [{ text: "既然這麼愛看，要不要多傳幾張？", next: 'l5_b' }] },
    'l5_a': { msg: "沒嫌妳，只是覺得... 這樣挺好的。", options: [{ text: "覺得什麼？說清楚喔。", next: 'l6_a' }] },
    'l5_b': { msg: "免了，一張就夠受了。", options: [{ text: "你這是在變相拒絕我的美色嗎？", next: 'l6_b' }] },
    'l6_a': { msg: "覺得妳很有活力，像個笨蛋。", options: [{ text: "你才是笨蛋！你全家都笨蛋！", next: 'l7_a' }] },
    'l6_b': { msg: "是在救妳，怕妳沒照片發動態。", options: [{ text: "哼，工作狂，祝你忙死。", next: 'l7_b' }] },
    'l7_a': { msg: `好了，別貧嘴。明天要幹嘛？`, options: [{ text: "明天下午想見某個姓予的帥哥。", next: 'l8_a' }] },
    'l7_b': { msg: "忙完就去見妳，行了吧？", options: [{ text: "誰要你見啊，稀罕喔。", next: 'l8_b' }] },
    'l8_a': { msg: "明天下午三點後可以陪妳喝咖啡。", options: [{ text: "耶！我就知道你最好了。", next: 'l9_a' }] },
    'l8_b': { msg: "我稀罕。三點老地方見，準時點。", options: [{ text: "看我心情，我不一定有空。", next: 'l9_b' }] },
    'l9_a': { msg: "只有這時候才說我好。", options: [{ text: "所以... 你剛才是在想我嗎？", next: 'l10_a' }] },
    'l9_b': { msg: "妳最好是有空。不准放我鴿子。", options: [{ text: "你對每個人都這麼兇嗎？", next: 'l10_b' }] },
    'l10_a': { msg: "算是吧。", options: [{ text: "什麼叫「算是」？想就想！", next: 'l11_a' }] },
    'l10_b': { msg: "只對笨蛋這樣。", options: [{ text: "所以我在你心裡就是個笨蛋？", next: 'l11_b' }] },
    'l11_a': { msg: "兇什麼。想妳想得睡不著，滿意了？", options: [{ text: "嘿嘿，我也想你。", next: 'l12_a' }] },
    'l11_b': { msg: "笨得挺可愛的那種。", options: [{ text: "可愛的話... 有獎勵嗎？", next: 'l12_b' }] },
    'l12_a': { msg: "既然互相想念，那出來見面？", options: [{ text: "現在？你是瘋了嗎？", next: 'l13_a' }] },
    'l12_b': { msg: "妳想要什麼獎勵？", options: [{ text: "請我喝飲料，還要陪我逛街。", next: 'l13_b' }] },
    'l13_a': { msg: "沒瘋。只是想看妳笑得很傻的樣子。", options: [{ text: "那你下來，我在我家巷口。", next: 'l14_a' }] },
    'l13_b': { msg: "成交。但妳要幫我挑東西。", options: [{ text: "挑什麼？送給女生的嗎？", next: 'l14_b' }] },
    'l14_a': { msg: "待在那別動。我五分鐘到。", options: [{ text: "這麼快？你開飛機嗎？", next: 'l15_a' }] },
    'l14_b': { msg: "給妳的。妳生日不是快到了？", options: [{ text: "原來你還記得我生日啊。", next: 'l15_b' }] },
    'l15_a': { msg: "怕妳跑了。我到路燈底下了。", options: [{ text: "我看到你了！揮手那個是你？", next: 'l16_a' }] },
    'l15_b': { msg: "妳的事情，我什麼時候忘記過？", options: [{ text: "那... 你還記得我喜歡什麼嗎？", next: 'l16_b' }] },
    'l16_a': { msg: "過來，外面冷。", options: [{ text: "你穿這件很好看耶。", next: 'l17_a' }] },
    'l16_b': { msg: "妳喜歡什麼不重要，重要的是妳。", options: [{ text: "予延，你今天說話真的很奇怪。", next: 'l17_b' }] },
    'l17_a': { msg: "為了見妳特地換的。", options: [{ text: "這麼重視我？看來我攻略成功了？", next: 'l18_a' }] },
    'l17_b': { msg: "就當我今晚沒吃藥。", options: [{ text: "這種奇怪，我可以多來一點。", next: 'l18_b' }] },
    'l18_a': { msg: "還差得遠呢，再接再厲。", options: [{ text: "哼，傲嬌鬼。明天見！", next: 'l19_a' }] },
    'l18_b': { msg: "想得美。快回去睡，明天見。", options: [{ text: "晚安，明天見不到你你就完了。", next: 'l19_b' }] },
    'l19_a': { msg: `明天三點。不准遲到。${getTimeGreeting()}。`, options: [] },
    'l19_b': { msg: `知道了，快去睡。${getTimeGreeting()}。`, options: [] }
};

// --- 控制函數 ---
function openMessages() { document.getElementById('messages-app').classList.add('active'); document.getElementById('sys-back').style.display='flex'; }
function openChat() { document.getElementById('chat-detail').classList.add('active'); }
function closeChat() { document.getElementById('chat-detail').classList.remove('active'); }
function goHome() { document.querySelectorAll('.app-window').forEach(el=>el.classList.remove('active')); document.getElementById('sys-back').style.display='none'; }

function showOptions() {
    const data = gameData[currentKey];
    const overlay = document.getElementById('options');
    if (!data || !data.options || data.options.length === 0) {
        alert("對話已結束，予延去忙囉！");
        return;
    }
    overlay.innerHTML = '';
    data.options.forEach(opt => {
        const btn = document.createElement('div'); btn.className = 'option-btn';
        btn.innerText = opt.text;
        btn.onclick = () => {
            const box = document.getElementById('chat-box');
            overlay.style.display = 'none';
            box.innerHTML += `<div class="bubble me">${opt.text}</div>`;
            currentKey = opt.next;
            setTimeout(() => {
                let response = gameData[currentKey].msg;
                // 自動替換最後的問候語
                if(response.includes("晚安")) response = response.replace("晚安", getTimeGreeting());
                
                box.innerHTML += `<div class="bubble you">${response}</div>`;
                document.getElementById('last-msg').innerText = response;
                box.scrollTop = box.scrollHeight;
            }, 800);
        };
        overlay.appendChild(btn);
    });
    overlay.style.display = 'flex';
}
</script>
</body>
</html>
