<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Love Logic: Silent AI</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --ios-wallpaper: linear-gradient(180deg, #0f172a 0%, #020617 100%);
  --accent: #ff2d55;
  --ios-blur: blur(25px) saturate(180%);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, sans-serif; overflow: hidden; }

.phone {
  width: 100vw; height: 100dvh; max-width: 375px; max-height: 812px;
  background: #000; border-radius: 50px; position: relative; overflow: hidden; border: 8px solid #222;
}

/* 鎖屏 */
#lock-screen { position: absolute; inset: 0; z-index: 9999; background: var(--ios-wallpaper); display: flex; flex-direction: column; align-items: center; padding-top: 80px; transition: 0.8s; cursor: pointer; }
.favor-bar-container { width: 80%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 20px; overflow: hidden; }
#favor-fill-lock { height: 100%; width: 50%; background: var(--accent); transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

/* 聊天視窗 */
.app-window { position: absolute; inset: 0; z-index: 1500; background: #000; display: none; flex-direction: column; }
.app-window.active { display: flex; }

.header { padding: 50px 20px 15px; background: rgba(15, 23, 42, 0.8); backdrop-filter: var(--ios-blur); display: flex; align-items: center; border-bottom: 0.5px solid rgba(255,255,255,0.1); }
.header-title { flex: 1; text-align: center; color: #fff; font-weight: 600; font-size: 15px; }

.chat-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #000; }
.bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.5; }
.you { background: #262629; color: #fff; align-self: flex-start; border-bottom-left-radius: 4px; }
.me { background: #0A84FF; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }

/* 選項清單 */
.options-overlay { 
    position: absolute; bottom: 0; left: 0; right: 0; background: rgba(28, 28, 30, 0.95); 
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom)); border-top-left-radius: 25px; border-top-right-radius: 25px;
    display: none; flex-direction: column; gap: 10px; z-index: 2000;
}
.option-btn { 
    background: rgba(255,255,255,0.08); padding: 16px; border-radius: 16px; color: #fff; text-align: center; cursor: pointer; font-size: 15px;
}
.option-btn:active { background: #3a3a3c; }

.status-bar { position: absolute; top: 0; width: 100%; height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; color: #fff; font-size: 12px; z-index: 10000; pointer-events: none; }
</style>
</head>
<body>

<div class="phone">
  <div class="status-bar"><div>12:00</div><div><i class="fas fa-signal"></i> <i class="fas fa-battery-full"></i></div></div>

  <div id="lock-screen" onclick="this.style.transform='translateY(-100%)'">
    <div style="font-size: 80px; color: #fff; font-weight: 200; margin-top: 40px;">12:00</div>
    <div style="color: rgba(255,255,255,0.5); margin-top: 5px;">與 ccz 的同步率</div>
    <div class="favor-bar-container"><div id="favor-fill-lock"></div></div>
    <div style="margin-top: auto; margin-bottom: 60px; color: rgba(255,255,255,0.4); font-size: 13px;">向上滑動以開始學習...</div>
  </div>

  <div style="height:100%; background: var(--ios-wallpaper); display: flex; align-items: center; justify-content: center;">
      <div onclick="openApp('chat-ccz')" style="width: 85%; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 24px; display: flex; align-items: center; cursor: pointer; border: 0.5px solid rgba(255,255,255,0.1);">
          <div style="width: 48px; height: 48px; background: #af52de; border-radius: 50%; margin-right: 15px;"></div>
          <div style="flex: 1;"><div style="color: #fff; font-weight: 600;">ccz</div><div style="color: #8e8e93; font-size: 13px;">憋死你算了</div></div>
      </div>
  </div>

  <div id="chat-ccz" class="app-window">
    <div class="header">
        <i class="fas fa-chevron-left" style="color:#0A84FF; cursor:pointer" onclick="closeApp()"></i>
        <div class="header-title">ccz</div>
        <div id="favor-display" style="color: #ff2d55; font-size: 12px;">同步率: 50%</div>
    </div>
    <div class="chat-body" id="chat-box">
        <div class="bubble you">喂，問你話呢，這幾天到底在瞎忙什麼？</div>
    </div>
    <div style="padding: 15px 15px 40px; background: #000;">
        <div onclick="showOptions()" style="background:#1c1c1e; border-radius:22px; padding:12px 18px; color:#8e8e93; border: 1px solid #333; text-align: center;">...</div>
    </div>
  </div>

  <div id="options" class="options-overlay"></div>
</div>

<script>
let favorability = 50;
let currentStep = 'start';

const gameData = {
    'start': {
        options: [
            { text: "沒忙什麼。", next: 'stubborn', impact: -2 },
            { text: "在想妳的事。", next: 'straight', impact: +10 },
            { text: "......", next: 'silent', impact: -5 }
        ]
    },
    'stubborn': {
        ccz: "沒忙什麼會連訊息都不回？你當我是三歲小孩好騙喔？",
        options: [
            { text: "對不起。", next: 'sorry', impact: +5 },
            { text: "嗯。", next: 'silent_annoy', impact: -8 }
        ]
    },
    'straight': {
        ccz: "哈？你這呆子突然在說什麼鬼話...臉皮變厚了喔？",
        options: [
            { text: "實話。", next: 'blush', impact: +12 },
            { text: "不知道。", next: 'silent_annoy', impact: -5 }
        ]
    },
    'silent': {
        ccz: "又是這副死樣子，不想說就拉倒，憋死你算了！",
        options: [
            { text: "好。", next: 'end_angry', impact: -10 },
            { text: "...", next: 'end_helpless', impact: +5 }
        ]
    },
    'silent_annoy': {
        ccz: "除了『嗯』還會說別的嗎？我看你真的是欠揍。",
        options: [
            { text: "想吃什麼？", next: 'food', impact: +8 }
        ]
    },
    'blush': { ccz: "嘖，懶得理你。那...那你忙完了沒？陪我去吃飯啦。", options: [] },
    'sorry': { ccz: "哼，道歉有用喔？算了，下次再這樣我真的不理你了。", options: [] },
    'end_angry': { ccz: "好？你還跟我說好？行，你就繼續憋著吧！掛了！", options: [] },
    'end_helpless': { ccz: "......真拿你沒辦法，到底誰才是這段關係的受害者啊？", options: [] },
    'food': { ccz: "我要吃那家貴死人的火鍋，你要買單！", options: [] }
};

function updateFavor(val) {
    favorability = Math.max(0, Math.min(100, favorability + val));
    document.getElementById('favor-display').innerText = `同步率: ${favorability}%`;
    document.getElementById('favor-fill-lock').style.width = favorability + '%';
}

function showOptions() {
    const data = gameData[currentStep];
    const overlay = document.getElementById('options');
    overlay.innerHTML = '';
    
    if (!data.options || data.options.length === 0) {
        overlay.innerHTML = '<div class="option-btn" onclick="resetGame()">重啟 AI (重新開始)</div>';
    } else {
        data.options.forEach(opt => {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => selectOption(opt);
            overlay.appendChild(btn);
        });
    }
    overlay.style.display = 'flex';
}

function selectOption(opt) {
    const box = document.getElementById('chat-box');
    document.getElementById('options').style.display = 'none';
    box.innerHTML += `<div class="bubble me">${opt.text}</div>`;
    updateFavor(opt.impact);
    currentStep = opt.next;
    
    setTimeout(() => {
        const nextData = gameData[currentStep];
        box.innerHTML += `<div class="bubble you">${nextData.ccz}</div>`;
        box.scrollTop = box.scrollHeight;
    }, 800);
}

function openApp(id) { document.getElementById(id).classList.add('active'); }
function closeApp() { document.querySelectorAll('.app-window').forEach(w => w.classList.remove('active')); }
function resetGame() { location.reload(); }

updateFavor(0);
</script>
</body>
</html>
