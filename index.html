<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>iPhone Custom Setup</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --ios-wallpaper: radial-gradient(circle at center, #2c3e50 0%, #000000 100%);
  --ios-blur: blur(25px) saturate(180%);
  --border-glass: 0.5px solid rgba(255, 255, 255, 0.15);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }

.phone {
  width: 100vw; height: 100dvh; max-width: 375px; max-height: 812px;
  background: #000; border-radius: 50px; position: relative; overflow: hidden; border: 12px solid #1c1c1e;
}

.status-bar { position: absolute; top: 0; width: 100%; height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 32px; z-index: 2000; color: #fff; font-size: 14px; font-weight: 600; }
.notch { width: 160px; height: 30px; background: #1c1c1e; position: absolute; top: 0; left: 50%; transform: translateX(-50%); border-radius: 0 0 20px 20px; z-index: 2001; }

/* 鎖屏介面 */
#lock-screen {
  position: absolute; inset: 0; z-index: 1500; background: var(--ios-wallpaper);
  display: flex; flex-direction: column; align-items: center; padding-top: 100px;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
}
.lock-time { font-size: 80px; font-weight: 200; color: #fff; }
.lock-hint { position: absolute; bottom: 60px; color: #fff; opacity: 0.7; font-size: 14px; animation: breathe 2s infinite; }

/* 主畫面 */
#home-screen { position: absolute; inset: 0; padding: 60px 25px; background: var(--ios-wallpaper); display: flex; flex-direction: column; z-index: 100; }

.app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 20px; }
.app { text-align: center; color: #fff; cursor: pointer; }
.icon { width: 62px; height: 62px; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; font-size: 30px; border: var(--border-glass); }
.app span { font-size: 12px; opacity: 0.9; }

.dock { 
  position: absolute; bottom: 25px; left: 15px; right: 15px; height: 95px; 
  background: rgba(255, 255, 255, 0.25); backdrop-filter: var(--ios-blur); 
  border-radius: 35px; display: flex; justify-content: space-evenly; align-items: center; border: var(--border-glass); 
}

.home-bar { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 135px; height: 5px; background: #fff; border-radius: 10px; opacity: 0.6; z-index: 2000; }

@keyframes breathe { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>
  <div class="status-bar">
    <div>10:58</div>
    <div><i class="fas fa-signal"></i> <i class="fas fa-wifi"></i> <i class="fas fa-battery-three-quarters"></i></div>
  </div>

  <div id="lock-screen" onclick="this.style.transform='translateY(-100%)'">
    <div class="lock-time">10:58</div>
    <div style="color:#fff; font-size:18px; margin-top:10px;">3月28日 星期六</div>
    <div class="lock-hint">向上滑動或點擊以解鎖</div>
  </div>

  <div id="home-screen">
    <div class="app-grid">
      <div class="app"><div class="icon" style="background: #34c759;"><i class="fas fa-comment"></i></div><span>訊息</span></div>
      <div class="app"><div class="icon" style="background: linear-gradient(#54d261, #34b344);"><i class="fas fa-envelope"></i></div><span>郵件</span></div>
      <div class="app"><div class="icon" style="background: #fff;"><i class="fas fa-calendar-alt" style="color: #ff3b30;"></i></div><span>行事曆</span></div>
      <div class="app"><div class="icon" style="background: #ff9500;"><i class="fas fa-sticky-note"></i></div><span>備忘錄</span></div>
    </div>

    <div class="app-grid">
      <div class="app"><div class="icon" style="background: #007aff;"><i class="fas fa-cloud"></i></div><span>檔案</span></div>
    </div>

    <div class="dock">
      <div class="app"><div class="icon" style="background: #34c759; margin-bottom: 0;"><i class="fas fa-phone"></i></div></div>
      <div class="app"><div class="icon" style="background: #fff; margin-bottom: 0;"><i class="fas fa-compass" style="color: #007aff;"></i></div></div>
      <div class="app"><div class="icon" style="background: #fff; margin-bottom: 0;"><i class="fas fa-image" style="color: #ff2d55;"></i></div></div>
      <div class="app"><div class="icon" style="background: #ff2d55; margin-bottom: 0;"><i class="fas fa-music"></i></div></div>
    </div>
  </div>

  <div class="home-bar" onclick="document.getElementById('lock-screen').style.transform='translateY(0)'"></div>
</div>

</body>
</html>
