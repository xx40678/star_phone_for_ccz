<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>iPhone Pro - CCZ Edition</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --ios-wallpaper: radial-gradient(circle at center, #2c2c2e 0%, #000000 100%);
  --accent: #0A84FF;
  --ios-blur: blur(30px) saturate(190%);
  --border-glass: 0.5px solid rgba(255, 255, 255, 0.15);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, sans-serif; overflow: hidden; }

.phone {
  width: 100vw; height: 100dvh; max-width: 375px; max-height: 812px;
  background: #000; border-radius: 50px; position: relative; overflow: hidden; border: 8px solid #1c1c1e;
  box-shadow: 0 50px 100px rgba(0,0,0,0.9);
}

/* 狀態列 */
.status-bar { position: absolute; top: 0; width: 100%; height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 30px; color: #fff; font-size: 12px; z-index: 10000; }

/* 隱藏式好感度面板 (YouTube 播放器風格) */
#favor-panel {
    position: absolute; right: -120px; top: 50%; transform: translateY(-50%);
    width: 140px; height: 80px; background: rgba(28, 28, 30, 0.9); backdrop-filter: var(--ios-blur);
    border-radius: 20px 0 0 20px; z-index: 10001; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex; align-items: center; padding: 15px; border: var(--border-glass);
}
#favor-panel.open { right: 0; }
#favor-arrow { position: absolute; left: 5px; color: var(--accent); cursor: pointer; transition: 0.3s; }
#favor-panel.open #favor-arrow { transform: rotate(180deg); left: 10px; }
.favor-content { margin-left: 15px; flex: 1; }
.favor-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 8px; overflow: hidden; }
#favor-fill { height: 100%; width: 50%; background: #ff2d55; transition: 0.8s; }

/* 鎖屏與主畫面 */
#lock-screen { position: absolute; inset: 0; z-index: 9999; background: var(--ios-wallpaper); display: flex; flex-direction: column; align-items: center; padding-top: 80px; transition: 0.6s; cursor: pointer; }
#home-screen { position: absolute; inset: 0; z-index: 100; padding: 60px 25px; background: var(--ios-wallpaper); }

/* 組件樣式 */
.widget { background: rgba(255, 255, 255, 0.12); padding: 15px; border-radius: 22px; backdrop-filter: var(--ios-blur); color: #fff; font-size: 14px; border: var(--border-glass); margin-bottom: 20px; }
.app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
.app { text-align: center; color: #fff; cursor: pointer; font-size: 11px; }
.icon { width: 60px; height: 60px; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; font-size: 28px; border: var(--border-glass); }

/* 聊天視窗 */
.app-window { position: absolute; inset: 0; z-index: 1500; background: #000; display: none; flex-direction: column; }
.app-window.active { display: flex; }
.header { padding: 50px 20px 15px; background: rgba(25, 25, 25, 0.8); backdrop-filter: var(--ios-blur); display: flex; align-items: center; border-bottom: 0.5px solid #222; }
.chat-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
.bubble { max-width: 80%; padding: 12px 16px; border-radius: 20px; font-size: 15px; line-height: 1.4; }
.you { background: #262629; color: #fff; align-self: flex-start; border-bottom-left-radius: 4px; }
.me { background: #0A84FF; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }

/* 選項彈窗 */
.options-overlay { 
    position: absolute; bottom: 0; left: 0; right: 0; background: rgba(28, 28, 30, 0.98); 
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom)); border-radius: 25px 25px 0 0;
    display: none; flex-direction: column; gap: 10px; z-index: 2000;
}
.option-btn { background: rgba(255,255,255,0.08); padding: 15px; border-radius: 15px; color: #fff; text-align: center; cursor: pointer; }
</style>
</head>
<body>

<div class="phone">
  <div class="status-bar"><div>16:20</div><div><i class="fas fa-signal"></i> <i class="fas fa-battery-full"></i></div></div>

  <div id="favor-panel" onclick="toggleFavor()">
      <div id="favor-arrow"><i class="fas fa-chevron-left"></i></div>
      <div class="favor-content">
          <div style="color:#fff; font-size:11px; font-weight:600;">同步率</div>
          <div id="favor-val" style="color:#ff2d55; font-size:18px; font-weight:800;">50%</div>
          <div class="favor-bar"><div id="favor-fill"></div></div>
      </div>
  </div>

  <div id="lock-screen" onclick="this.style.transform='translateY(-100%)'">
    <div style="font-size: 80px; color: #fff; font-weight: 200; margin-top: 40px;">16:20</div>
    <div class="widget" style="margin-top:40px; width:80%; text-align:center;">
        <i class="fas fa-heart" style="color:#ff2d55; margin-right:8px;"></i> 你不在，我其實也不太想解鎖。
    </div>
  </div>

  <div id="home-screen">
    <div class="widget" style="background:none; padding:0; margin-bottom:30px;">
        <div style="font-size:20px; color:#fff; font-weight:600;">3月28日 星期六</div>
        <div style="color:rgba(255,255,255,0.6);">「你要再晚睡，我不保證我還會這麼冷靜。」</div>
    </div>
    
    <div class="app-grid">
      <div class="app" onclick="openApp('msg-list')"><div class="icon" style="color:#4cd964;"><i class="fas fa-comment"></i></div><span>訊息</span></div>
      <div class="app" onclick="openApp('photos-app')"><div class="icon" style="color:#8e8e93;"><i class="fas fa-image"></i></div><span>相簿</span></div>
      <div class="app" onclick="openApp('search-app')"><div class="icon" style="color:#5AC8FA;"><i class="fas fa-compass"></i></div><span>Safari</span></div>
      <div class="app" onclick="openApp('phone-app')"><div class="icon" style="color:#32D74B;"><i class="fas fa-phone"></i></div><span>聯絡人</span></div>
    </div>
  </div>

  <div id="msg-list" class="app-window">
    <div class="header"><i class="fas fa-chevron-left" style="color:var(--accent); cursor:pointer" onclick="closeApp()"></i><div style="flex:1; text-align:center; color:#fff;">訊息</div></div>
    <div class="list-item" onclick="openApp('chat-ccz')" style="padding:15px; display:flex; align-items:center; border-bottom:0.5px solid #222; cursor:pointer;">
        <div style="width:45px; height:45px; background:#af52de; border-radius:50%; margin-right:15px;"></div>
        <div style="flex:1;"><div style="color:#fff; font-weight:600;">ccz</div><div style="color:#8e8e93; font-size:13px;">憋死你算了</div></div>
    </div>
  </div>

  <div id="chat-ccz" class="app-window">
    <div class="header">
        <i class="fas fa-chevron-left" style="color:var(--accent); cursor:pointer" onclick="openApp('msg-list')"></i>
        <div style="flex:1; text-align:center; color:#fff; font-weight:600;">ccz</div>
    </div>
    <div class="chat-body" id="chat-box">
        <div class="bubble you">餵，問你話呢，這幾天到底在瞎忙什麼？</div>
    </div>
    <div style="padding: 15px 15px 40px; background: #000;">
        <div onclick="showOptions()" style="background:#1c1c1e; border-radius:22px; padding:12px 18px; color:#8e8e93; border: 1px solid #333; text-align: center; cursor:pointer;">點擊回應</div>
    </div>
  </div>

  <div id="search-app" class="app-window">
    <div class="header"><i class="fas fa-chevron-left" style="color:var(--accent); cursor:pointer" onclick="closeApp()"></i><div style="flex:1; text-align:center; color:#fff;">Safari</div></div>
    <div style="padding:20px; color:#fff;">
        <h3 style="margin-bottom:15px;">關於她</h3>
        <div style="color:#8e8e93; font-size:14px; border-bottom:0.5px solid #222; padding:10px 0;">女生喜歡的口紅色號</div>
        <div style="color:#8e8e93; font-size:14px; border-bottom:0.5px solid #222; padding:10px 0;">如何應對毒舌的女朋友</div>
        <h3 style="margin:20px 0 15px;">歷史紀錄</h3>
        <div style="color:#8e8e93; font-size:14px; border-bottom:0.5px solid #222; padding:10px 0;">珍珠放五天會變大嗎?</div>
    </div>
  </div>

  <div id="photos-app" class="app-window">
    <div class="header"><i class="fas fa-chevron-left" style="color:var(--accent); cursor:pointer" onclick="closeApp()"></i><div style="flex:1; text-align:center; color:#fff;">照片</div></div>
    <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:2px; padding:2px;">
        <div style="aspect-ratio:1/1; background:#FFD1DC;"></div>
        <div style="aspect-ratio:1/1; background:#E6E6FA;"></div>
        <div style="aspect-ratio:1/1; background:#92C5C5;"></div>
    </div>
  </div>

  <div id="options" class="options-overlay"></div>
</div>

<script>
let favorability = 50;
let currentStep = 'start';

const gameData = {
    'start': {
        options: [
            { text: "沒忙什麼。", next: 'stubborn', impact: -2 },
            { text: "在想妳的事。", next: 'straight', impact: +10 },
            { text: "......", next: 'silent', impact: -5 }
        ]
    },
    'stubborn': {
        ccz: "沒忙什麼會連訊息都不回？你當我是三歲小孩好騙喔？",
        options: [{ text: "對不起。", next: 'end', impact: +5 }, { text: "嗯。", next: 'end', impact: -5 }]
    },
    'silent': {
        ccz: "又是這副死樣子，不想說就拉倒，憋死你算了！",
        options: [
            { text: "好。", next: 'angry', impact: -10 },
            { text: "...", next: 'helpless', impact: +5 }
        ]
    },
    'straight': { ccz: "哈？臉皮變厚了喔？懶得理你。忙完陪我去吃飯！", options: [] },
    'angry': { ccz: "好？你還跟我說好？行，你就繼續憋著吧！", options: [] },
    'helpless': { ccz: "......真拿你沒辦法。下次再消失試試看。", options: [] },
    'end': { ccz: "哼，這次先放過你。", options: [] }
};

function toggleFavor() { document.getElementById('favor-panel').classList.toggle('open'); }

function updateFavor(val) {
    favorability = Math.max(0, Math.min(100, favorability + val));
    document.getElementById('favor-val').innerText = `${favorability}%`;
    document.getElementById('favor-fill').style.width = favorability + '%';
}

function showOptions() {
    const data = gameData[currentStep];
    const overlay = document.getElementById('options');
    overlay.innerHTML = '';
    if (!data.options || data.options.length === 0) {
        overlay.innerHTML = '<div class="option-btn" onclick="location.reload()">重啟 AI 系統</div>';
    } else {
        data.options.forEach(opt => {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => {
                const box = document.getElementById('chat-box');
                overlay.style.display = 'none';
                box.innerHTML += `<div class="bubble me">${opt.text}</div>`;
                updateFavor(opt.impact);
                currentStep = opt.next;
                setTimeout(() => {
                    box.innerHTML += `<div class="bubble you">${gameData[currentStep].ccz}</div>`;
                    box.scrollTop = box.scrollHeight;
                }, 800);
            };
            overlay.appendChild(btn);
        });
    }
    overlay.style.display = 'flex';
}

function openApp(id) { document.getElementById(id).classList.add('active'); }
function closeApp() { document.querySelectorAll('.app-window').forEach(w => w.classList.remove('active')); }

updateFavor(0);
</script>
</body>
</html>
