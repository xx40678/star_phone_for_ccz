<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>star.phone v2 - refined</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg:#0b0b10;
  --glass:rgba(255,255,255,0.08);
  --text:#fff;
  --sub:#9aa0aa;
  --accent:#9b5cff;
}
body{
  margin:0;background:#1a1a1a;display:flex;justify-content:center;align-items:center;height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}
.phone{
  width:360px;
  height:720px;
  background:var(--bg);
  border-radius:45px;
  overflow:hidden;
  position:relative;
  box-shadow:0 30px 80px rgba(0,0,0,.8);
  border: 8px solid #1f1f25;
}
.screen{
  position:absolute;
  inset:0;
  transition: opacity 0.5s ease;
}
.hidden{display:none !important;}

/* 鎖屏樣式 */
.time{font-size:68px;font-weight:700;letter-spacing:-2px;margin-top:40px;}
.date{color:var(--sub);font-size:18px;}

/* 主畫面 */
.app-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:20px;
  padding: 60px 20px;
}
.app{text-align:center;font-size:12px;color:#fff;cursor:pointer; transition: transform 0.2s;}
.app:active{transform: scale(0.9);}
.icon{
  width:62px;height:62px;border-radius:18px;background:var(--glass);
  display:flex;align-items:center;justify-content:center;margin:0 auto 8px;font-size:24px;
  backdrop-filter: blur(10px);
}

/* App 視窗通用樣式 */
.app-window{
  position:absolute;inset:0;background:var(--bg);
  transform:translateY(20px);opacity:0;transition:.3s ease;
  pointer-events: none; /* 關鍵：未開啟時不擋住下方點擊 */
  z-index: 10;
  display: flex; flex-direction: column;
  padding: 20px;
  box-sizing: border-box;
}
.app-window.active{transform:translateY(0);opacity:1;pointer-events: auto;}

.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-top:10px;}
.btn{
  background:var(--glass);border:none;color:#fff;padding:8px 15px;border-radius:12px;cursor:pointer;
}

/* 對話樣式 */
.chat{
  flex: 1;
  display:flex;flex-direction:column;gap:12px;
  overflow-y:auto;
  padding-right: 4px;
}
.chat::-webkit-scrollbar { width: 0; } /* 隱藏滾動條 */

.bubble{
  max-width:80%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.4;
}
.me{background:var(--accent);align-self:flex-end;border-bottom-right-radius:4px;}
.you{background:#2c2c34;align-self:flex-start;border-bottom-left-radius:4px;}

/* 關係進度條 */
.progress-container {
    width: 100%; height: 8px; background: #222; border-radius: 10px; margin: 15px 0; overflow: hidden;
}
.progress-bar {
    height: 100%; background: linear-gradient(90deg, #6a11cb 0%, #9b5cff 100%); width: 0%; transition: width 1s ease;
}
</style>
</head>
<body>

<div class="phone">

  <div id="lock" class="screen" style="cursor: pointer; z-index: 100;">
    <div style="height: 100%; width: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box; background: linear-gradient(to bottom, rgba(0,0,0,0.2), transparent);">
      <div class="time" id="time">00:00</div>
      <div class="date" id="date">1月1日 星期一</div>
      
      <div style="margin: auto 0; color: #eee; font-size: 18px; text-align: center; line-height: 1.6; letter-spacing: 1px;">
        「你不在，<br>我其實也不太想解鎖。」
      </div>
      
      <div style="margin-bottom: 60px; color: var(--sub); font-size: 14px; animation: breathe 2s infinite;">
        點擊解鎖 <i class="fa-solid fa-chevron-up" style="margin-left: 4px;"></i>
      </div>
    </div>
  </div>

  <div id="home" class="screen hidden">
    <div class="app-grid">
        <div class="app" onclick="openApp('messages')">
            <div class="icon" style="color: #58cc02;"><i class="fa-solid fa-comment"></i></div>訊息
        </div>
        <div class="app" onclick="openApp('love')">
            <div class="icon" style="color: #ff4d4d;"><i class="fa-solid fa-heart"></i></div>關係
        </div>
    </div>
  </div>

  <div id="messages" class="app-window">
    <div class="header">
      <button class="btn" onclick="closeApp()"><i class="fa-solid fa-chevron-left"></i></button>
      <div style="font-weight: 600;">ccz</div>
      <div style="width: 40px;"></div>
    </div>
    <div id="chat" class="chat">
        </div>
    <div style="padding-top:15px">
      <input style="width:100%;background:#1a1a20;border:1px solid #333;color:#fff;padding:12px;border-radius:15px;box-sizing: border-box;" placeholder="輸入訊息…">
    </div>
  </div>

  <div id="love" class="app-window">
    <div class="header">
      <button class="btn" onclick="closeApp()"><i class="fa-solid fa-chevron-left"></i></button>
      <div style="font-weight: 600;">Relationship</div>
      <div style="width: 40px;"></div>
    </div>
    <div id="loveContent" style="color: #eee; line-height: 1.8;">
        </div>
  </div>

</div>

<script>
function updateTime() {
    const timeEl = document.getElementById('time');
    const dateEl = document.getElementById('date');
    const d = new Date();
    
    if (timeEl) {
        timeEl.innerText = d.toLocaleTimeString('zh-TW', {hour:'2-digit', minute:'2-digit', hour12: false});
    }
    if (dateEl) {
        dateEl.innerText = d.toLocaleDateString('zh-TW', {month:'long', day:'numeric', weekday: 'long'});
    }
}

function openApp(id) {
    document.querySelectorAll(".app-window").forEach(a => a.classList.remove("active"));
    const target = document.getElementById(id);
    if (target) {
        target.classList.add("active");
        if (id === "messages") renderChat();
        if (id === "love") renderLove();
    }
}

function closeApp() {
    document.querySelectorAll(".app-window").forEach(a => a.classList.remove("active"));
}

function renderChat() {
    const chat = document.getElementById("chat");
    chat.innerHTML = `
        <div class="bubble you">今天有好好吃飯嗎？</div>
        <div class="bubble me">…有</div>
        <div class="bubble me">別管那麼多</div>
        <div class="bubble you">你在生氣？</div>
    `;
    chat.scrollTop = chat.scrollHeight;
}

function renderLove() {
    const el = document.getElementById("loveContent");
    el.innerHTML = `
        <div style="margin-bottom: 20px;">
            <span style="font-size: 14px; color: var(--sub);">目前關係強度</span>
            <div style="font-size: 32px; font-weight: bold; margin-top: 5px;">80%</div>
            <div class="progress-container"><div class="progress-bar" id="pbar"></div></div>
        </div>
        <div style="background: var(--glass); padding: 15px; border-radius: 15px;">
            <p><strong>狀態評價：</strong> 還行</p>
            <p><strong>備註：</strong><br><span style="color: #ff8e8e;">「你如果再晚睡，我不保證我還會這麼冷靜。」</span></p>
        </div>
    `;
    setTimeout(() => { document.getElementById('pbar').style.width = '80%'; }, 100);
}

window.onload = function() {
    // 鎖屏點擊
    const lock = document.getElementById('lock');
    lock.addEventListener('click', () => {
        lock.style.opacity = '0';
        setTimeout(() => {
            lock.classList.add("hidden");
            document.getElementById('home').classList.remove("hidden");
        }, 500);
    });

    updateTime();
    setInterval(updateTime, 1000);
};
</script>

<style>
@keyframes breathe {
    0%, 100% { opacity: 0.4; transform: translateY(0); }
    50% { opacity: 0.9; transform: translateY(-5px); }
}
</style>

</body>
</html>
