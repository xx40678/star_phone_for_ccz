<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>iPhone Omni Edition</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --ios-wallpaper: radial-gradient(circle at center, #1c1c1e 0%, #000000 100%);
  --ios-blur: blur(30px) saturate(190%);
  --border-glass: 0.5px solid rgba(255, 255, 255, 0.1);
  --app-dark-bg: #2c2c2e;
  --ios-blue: #0A84FF;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }

.phone { width: 100vw; height: 100dvh; max-width: 375px; max-height: 812px; background: #000; border-radius: 55px; position: relative; overflow: hidden; border: 12px solid #1c1c1e; }

/* UI 元件 */
.status-bar { position: absolute; top: 0; width: 100%; height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 32px; z-index: 5000; color: #fff; font-size: 14px; }
.system-back { position: absolute; top: 46px; left: 20px; z-index: 4000; color: var(--ios-blue); font-size: 13px; display: none; align-items: center; font-weight: 500; cursor: pointer; }
.notch { width: 160px; height: 30px; background: #1c1c1e; position: absolute; top: 0; left: 50%; transform: translateX(-50%); border-radius: 0 0 20px 20px; z-index: 5001; }

/* 鎖屏 */
#lock-screen { position: absolute; inset: 0; z-index: 4500; background: var(--ios-wallpaper); display: flex; flex-direction: column; align-items: center; padding-top: 100px; transition: transform 0.6s ease; cursor: pointer; }
.lock-time { font-size: 80px; font-weight: 200; color: #fff; }
.lock-date { font-size: 22px; font-weight: 600; color: #fff; margin-top: 5px; text-shadow: 0 0 10px rgba(0,0,0,0.8); }
.quote-widget { margin-top: 30px; padding: 12px 24px; background: rgba(255, 255, 255, 0.12); border-radius: 20px; color: #fff; font-size: 14px; backdrop-filter: blur(15px); border: var(--border-glass); }

/* 主畫面 */
#home-screen { position: absolute; inset: 0; padding: 60px 25px; background: var(--ios-wallpaper); display: flex; flex-direction: column; z-index: 100; }
.sticky-note-widget { width: 100%; height: 150px; background: rgba(44, 44, 46, 0.6); border-radius: 28px; margin-top: 20px; padding: 20px; border: var(--border-glass); color: #fff; }
.app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 25px; }
.app { text-align: center; color: #fff; cursor: pointer; }
.icon { width: 62px; height: 62px; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; font-size: 32px; background: var(--app-dark-bg); border: var(--border-glass); }
.dock { position: absolute; bottom: 30px; left: 15px; right: 15px; height: 96px; background: rgba(44, 44, 46, 0.4); backdrop-filter: var(--ios-blur); border-radius: 38px; display: flex; justify-content: space-evenly; align-items: center; border: var(--border-glass); }

/* App 視窗 */
.app-window { position: absolute; inset: 0; z-index: 1500; background: #000; display: none; flex-direction: column; }
.app-window.active { display: flex; }
.chat-header { padding: 50px 15px 15px; background: rgba(20, 20, 20, 0.9); backdrop-filter: var(--ios-blur); display: flex; align-items: center; border-bottom: 0.5px solid #222; }
.chat-back-btn { color: var(--ios-blue); font-size: 17px; cursor: pointer; width: 85px; display: flex; align-items: center; }
.chat-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
.bubble { max-width: 75%; padding: 10px 16px; border-radius: 18px; color: #fff; font-size: 16px; line-height: 1.4; }
.you { background: #262629; align-self: flex-start; border-bottom-left-radius: 4px; }
.me { background: var(--ios-blue); align-self: flex-end; border-bottom-right-radius: 4px; }

/* 選項層 */
.options-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(28, 28, 30, 0.98); padding: 20px 20px 45px; border-radius: 25px 25px 0 0; display: none; flex-direction: column; gap: 10px; z-index: 6000; }
.option-btn { background: rgba(255,255,255,0.1); padding: 16px; border-radius: 16px; color: #fff; text-align: center; cursor: pointer; }
.home-bar { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 135px; height: 5px; background: #fff; border-radius: 10px; opacity: 0.5; z-index: 7000; cursor: pointer; }
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>
  <div class="status-bar"><div id="status-time">12:00</div><div><i class="fas fa-signal"></i> <i class="fas fa-wifi"></i> <i class="fas fa-battery-full"></i></div></div>
  <div id="sys-back" class="system-back" onclick="goHome()"><i class="fas fa-chevron-left"></i> 主畫面</div>

  <div id="lock-screen" onclick="this.style.transform='translateY(-100%)'">
    <div id="lock-time-display" class="lock-time">12:00</div>
    <div class="lock-date">3月28日 星期六</div>
    <div class="quote-widget">જ⁀➴感覺至上 -ˋˏ ♡ ˎˊ-</div>
  </div>

  <div id="home-screen">
    <div class="sticky-note-widget">
        <h4 style="font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 12px;">MEMO</h4>
        <div style="font-size: 16px; margin-bottom: 8px;">¹ 記得喝水</div>
        <div style="font-size: 16px;">² 別忘記回訊息</div>
    </div>
    <div class="app-grid">
      <div class="app" onclick="openApp('messages-app')"><div class="icon" style="color:#34c759;"><i class="fas fa-comment"></i></div><span>訊息</span></div>
      <div class="app"><div class="icon" style="color:#0A84FF;"><i class="fas fa-envelope"></i></div><span>郵件</span></div>
      <div class="app"><div class="icon" style="color:#ff3b30;"><i class="fas fa-calendar-alt"></i></div><span>行事曆</span></div>
      <div class="app"><div class="icon" style="color:#E1306C;"><i class="fab fa-instagram"></i></div><span>IG</span></div>
    </div>
    <div class="dock">
      <div class="app"><div class="icon" style="color:#30D158; margin:0;"><i class="fas fa-phone"></i></div></div>
      <div class="app" onclick="openApp('safari-app')"><div class="icon" style="color:#0A84FF; margin:0;"><i class="fas fa-compass"></i></div></div>
      <div class="app"><div class="icon" style="color:#FF375F; margin:0;"><i class="fas fa-image"></i></div></div>
      <div class="app"><div class="icon" style="color:#FF375F; margin:0;"><i class="fas fa-music"></i></div></div>
    </div>
  </div>

  <div id="messages-app" class="app-window">
    <div style="padding: 65px 20px 10px; font-size: 34px; font-weight: 700; color: #fff;">訊息</div>
    <div style="display:flex; align-items:center; padding:15px 20px; border-bottom:0.5px solid #222;" onclick="openChat()">
      <div style="width:50px; height:50px; background:#333; border-radius:50%; margin-right:15px; display:flex; align-items:center; justify-content:center; color:#fff;">延</div>
      <div style="flex:1;"><div style="color:#fff; font-weight:600;">予延</div><div id="last-msg" style="color:#8e8e93; font-size:14px;">......妳還沒睡？</div></div>
    </div>
  </div>

  <div id="chat-detail" class="app-window">
    <div class="chat-header">
        <div class="chat-back-btn" onclick="closeChat()"><i class="fas fa-chevron-left"></i> 訊息</div>
        <div style="flex:1; text-align:center; color:#fff; font-weight:600; margin-right:85px;">予延</div>
    </div>
    <div class="chat-body" id="chat-box"><div class="bubble you">......妳還沒睡？</div></div>
    <div style="padding: 15px 15px 45px; background: #000;"><div onclick="showOptions()" style="background:#1c1c1e; border-radius:22px; padding:12px 18px; color:#fff; border: 1px solid #444; text-align:center; cursor:pointer;">回覆予延...</div></div>
  </div>

  <div id="safari-app" class="app-window">
    <div style="padding: 65px 20px 10px; font-size: 34px; font-weight: 700; color: #fff;">Safari</div>
    <div style="padding:15px; border-bottom:0.5px solid #333; color:#fff;">如何攻略AI</div>
    <div style="padding:15px; border-bottom:0.5px solid #333; color:#fff;">如何提升apex槍法</div>
    <div style="padding:15px; border-bottom:0.5px solid #333; color:#fff;">2026口紅熱門色號</div>
  </div>

  <div id="options" class="options-overlay"></div>
  <div class="home-bar" onclick="goHome()"></div>
</div>

<script>
function updateClock() {
    const now = new Date();
    const timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
    document.getElementById('status-time').innerText = timeStr;
    document.getElementById('lock-time-display').innerText = timeStr;
}
setInterval(updateClock, 1000); updateClock();

function getGreeting() {
    const hr = new Date().getHours();
    return (hr >= 5 && hr < 11) ? "早安" : (hr >= 11 && hr < 17) ? "今天過得還好嗎" : (hr >= 17 && hr < 23) ? "晚上好" : "晚安";
}

// --- 真正的全分支劇情數據 ---
let currentKey = 'start';
const gameData = {
    'start': { options: [{ text: "在等你回訊息啊，高冷帥哥。", next: 'A1' }, { text: "睡不著。你呢？為什麼還醒著？", next: 'B1' }] },
    // A線：互損與約會
    'A1': { msg: "......別亂叫。", options: [{ text: "臉紅了嗎？真可惜隔著螢幕看不到。", next: 'A2' }] },
    'A2': { msg: "沒紅。快去睡覺。", options: [{ text: "惱羞成怒喔？那我不吵你了。", next: 'A3' }] },
    'A3': { msg: "沒說不讓妳吵。隨便妳。", options: [{ text: "那我也要吵。明天三點老地方見？", next: 'A4' }] },
    'A4': { msg: "明天下午三點後可以陪妳喝咖啡。", options: [{ text: "耶！我就知道你最好了。", next: 'A5' }] },
    'A5': { msg: "只有這時候才說我好。快去睡。", options: [{ text: "好啦，晚安。", next: 'A6' }] },
    'A6': { msg: `知道了。${getGreeting()}。`, options: [] },
    // B線：深夜直球與見面
    'B1': { msg: "在看妳之前發的那張照片。", options: [{ text: "哪一張？我有發過照片嗎？", next: 'B2' }] },
    'B2': { msg: "這張。妳笑得很傻的那張。", options: [{ text: "既然愛看，要不要多傳幾張？", next: 'B3' }] },
    'B3': { msg: "免了，一張就夠受了。", options: [{ text: "在拒絕我的美色嗎？", next: 'B4' }] },
    'B4': { msg: "是在救妳，怕妳沒照片發動態。", options: [{ text: "哼，工作狂，祝你忙死。", next: 'B5' }] },
    'B5': { msg: "忙完就去見妳，行了吧？", options: [{ text: "誰要你見啊，稀罕喔。", next: 'B6' }] },
    'B6': { msg: "我稀罕。妳在那待著別動，我五分鐘到。", options: [{ text: "什麼？你真的要來？", next: 'B7' }] },
    'B7': { msg: `我到路燈底下了。${getGreeting()}，下來吧。`, options: [] }
};

function openApp(id) { document.getElementById(id).classList.add('active'); document.getElementById('sys-back').style.display='flex'; }
function openChat() { document.getElementById('chat-detail').classList.add('active'); document.getElementById('sys-back').style.display='none'; }
function closeChat() { document.getElementById('chat-detail').classList.remove('active'); document.getElementById('sys-back').style.display='flex'; }
function goHome() { document.querySelectorAll('.app-window').forEach(el=>el.classList.remove('active')); document.getElementById('sys-back').style.display='none'; }

function showOptions() {
    const data = gameData[currentKey];
    const overlay = document.getElementById('options');
    if (!data || !data.options || data.options.length === 0) return;
    overlay.innerHTML = '';
    data.options.forEach(opt => {
        const btn = document.createElement('div'); btn.className = 'option-btn';
        btn.innerText = opt.text;
        btn.onclick = () => {
            const box = document.getElementById('chat-box');
            overlay.style.display = 'none';
            box.innerHTML += `<div class="bubble me">${opt.text}</div>`;
            currentKey = opt.next;
            setTimeout(() => {
                let response = gameData[currentKey].msg;
                box.innerHTML += `<div class="bubble you">${response}</div>`;
                document.getElementById('last-msg').innerText = response;
                box.scrollTop = box.scrollHeight;
            }, 800);
        };
        overlay.appendChild(btn);
    });
    overlay.style.display = 'flex';
}
</script>
</body>
</html>
