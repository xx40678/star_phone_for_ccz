<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>iPhone Perfect Setup</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --ios-wallpaper: radial-gradient(circle at center, #1c1c1e 0%, #000000 100%);
  --ios-blur: blur(30px) saturate(190%);
  --border-glass: 0.5px solid rgba(255, 255, 255, 0.1);
  --app-dark-bg: #2c2c2e;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }

.phone {
  width: 100vw; height: 100dvh; max-width: 375px; max-height: 812px;
  background: #000; border-radius: 55px; position: relative; overflow: hidden; border: 12px solid #1c1c1e;
}

.status-bar { position: absolute; top: 0; width: 100%; height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 32px; z-index: 2000; color: #fff; font-size: 14px; }
.notch { width: 160px; height: 30px; background: #1c1c1e; position: absolute; top: 0; left: 50%; transform: translateX(-50%); border-radius: 0 0 20px 20px; z-index: 2001; }

#lock-screen {
  position: absolute; inset: 0; z-index: 1500; background: var(--ios-wallpaper);
  display: flex; flex-direction: column; align-items: center; padding-top: 100px;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
}
.lock-time { font-size: 84px; font-weight: 200; color: #fff; line-height: 1; }
.lock-date { color: #fff; font-size: 20px; font-weight: 400; margin-top: 8px; }
.quote-widget {
  margin-top: 25px; padding: 10px 20px; background: rgba(255, 255, 255, 0.08);
  border-radius: 18px; color: #fff; font-size: 14px; letter-spacing: 1px;
  backdrop-filter: blur(10px); border: var(--border-glass);
}

#home-screen { position: absolute; inset: 0; padding: 60px 25px; background: var(--ios-wallpaper); display: flex; flex-direction: column; z-index: 100; }

.sticky-note-widget {
  width: 100%; height: 150px; background: rgba(44, 44, 46, 0.6); backdrop-filter: blur(20px);
  border-radius: 28px; margin-top: 20px; padding: 20px; border: var(--border-glass); color: #fff;
  display: flex; flex-direction: column; justify-content: center;
}
.sticky-note-widget h4 { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 12px; font-weight: 500; }
.note-item { font-size: 16px; margin-bottom: 8px; font-weight: 400; letter-spacing: 0.5px; color: rgba(255,255,255,0.9); }

.app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-top: 25px; }
.app { text-align: center; color: #fff; cursor: pointer; }
.icon { 
  width: 62px; height: 62px; border-radius: 16px; display: flex; align-items: center; justify-content: center; 
  margin: 0 auto 8px; font-size: 32px; background: var(--app-dark-bg); border: var(--border-glass);
}
.app span { font-size: 12px; color: #fff; opacity: 0.8; font-weight: 300; }

.icon.msg { color: #34c759; }
.icon.mail { color: #0A84FF; }
.icon.cal { color: #ff3b30; }
.icon.ins { color: #E1306C; } /* Ins 深色色調 */
.icon.phone-app { color: #30D158; }
.icon.safari { color: #0A84FF; }
.icon.photos { color: #FF375F; }
.icon.music { color: #FF375F; }

.dock { 
  position: absolute; bottom: 30px; left: 15px; right: 15px; height: 96px; 
  background: rgba(44, 44, 46, 0.4); backdrop-filter: var(--ios-blur); 
  border-radius: 38px; display: flex; justify-content: space-evenly; align-items: center; border: var(--border-glass); 
}

/* 訊息視窗 */
.app-window { position: absolute; inset: 0; z-index: 1500; background: #000; display: none; flex-direction: column; }
.app-window.active { display: flex; }
.header { padding: 50px 20px 15px; background: rgba(20, 20, 20, 0.9); backdrop-filter: var(--ios-blur); display: flex; align-items: center; border-bottom: 0.5px solid #222; }
.chat-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
.bubble { max-width: 75%; padding: 10px 16px; border-radius: 18px; color: #fff; font-size: 16px; line-height: 1.4; }
.you { background: #262629; align-self: flex-start; border-bottom-left-radius: 4px; }
.me { background: #0A84FF; align-self: flex-end; border-bottom-right-radius: 4px; }

.options-overlay { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(28, 28, 30, 0.98); padding: 20px 20px 40px; border-radius: 25px 25px 0 0; display: none; flex-direction: column; gap: 10px; z-index: 2001; }
.option-btn { background: rgba(255,255,255,0.1); padding: 16px; border-radius: 16px; color: #fff; text-align: center; cursor: pointer; }

.home-bar { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 135px; height: 5px; background: #fff; border-radius: 10px; opacity: 0.5; z-index: 2000; }
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>
  <div class="status-bar"><div>11:20</div><div><i class="fas fa-signal"></i> <i class="fas fa-wifi"></i> <i class="fas fa-battery-full"></i></div></div>

  <div id="lock-screen" onclick="this.style.transform='translateY(-100%)'">
    <div class="lock-time">11:20</div>
    <div class="lock-date">3月28日 星期六</div>
    <div class="quote-widget">જ⁀➴感覺至上 -ˋˏ ♡ ˎˊ-</div>
    <div style="position: absolute; bottom: 60px; color: #fff; opacity: 0.5; font-size: 13px;">向上滑動解鎖</div>
  </div>

  <div id="home-screen">
    <div class="sticky-note-widget">
        <h4>MEMO</h4>
        <div class="note-item">¹ 記得喝水</div>
        <div class="note-item">² 別忘記回訊息</div>
    </div>
    <div class="app-grid">
      <div class="app" onclick="openApp('chat-yuyan')"><div class="icon msg"><i class="fas fa-comment"></i></div><span>訊息</span></div>
      <div class="app"><div class="icon mail"><i class="fas fa-envelope"></i></div><span>郵件</span></div>
      <div class="app"><div class="icon cal"><i class="fas fa-calendar-alt"></i></div><span>行事曆</span></div>
      <div class="app"><div class="icon ins"><i class="fab fa-instagram"></i></div><span>Instagram</span></div>
    </div>
    <div class="dock">
      <div class="app"><div class="icon phone-app" style="margin-bottom:0;"><i class="fas fa-phone"></i></div></div>
      <div class="app"><div class="icon safari" style="margin-bottom:0;"><i class="fas fa-compass"></i></div></div>
      <div class="app"><div class="icon photos" style="margin-bottom:0;"><i class="fas fa-image"></i></div></div>
      <div class="app"><div class="icon music" style="margin-bottom:0;"><i class="fas fa-music"></i></div></div>
    </div>
  </div>

  <div id="chat-yuyan" class="app-window">
    <div class="header">
        <i class="fas fa-chevron-left" style="color:#444;"></i>
        <div style="flex:1; text-align:center; color:#fff; font-weight:600;">予延</div>
    </div>
    <div class="chat-body" id="chat-box">
        <div class="bubble you">予延：......妳還沒睡？</div>
    </div>
    <div style="padding: 15px 15px 40px; background: #000;">
        <div onclick="showOptions()" style="background:#1c1c1e; border-radius:22px; padding:12px 18px; color:#fff; border: 1px solid #444; text-align: center; cursor:pointer;">回覆予延...</div>
    </div>
  </div>

  <div id="options" class="options-overlay"></div>
  <div class="home-bar" onclick="closeApp()"></div>
</div>

<script>
let currentKey = 'start';
const gameData = {
    'start': {
        options: [
            { text: "在等你回訊息啊，高冷帥哥。", next: 'q1_wait' },
            { text: "睡不著。你呢？為什麼還醒著？", next: 'q1_why' }
        ]
    },
    'q1_wait': { 
        you: "予延：......別亂叫。", 
        options: [{ text: "臉紅了嗎？真可惜隔著螢幕看不到。", next: 'q2_face' }] 
    },
    'q1_why': { 
        you: "予延：在看妳之前發的那張照片。", 
        options: [{ text: "哪一張？我有發過照片嗎？", next: 'q2_photo' }] 
    },
    'q2_face': { 
        you: "予延：沒紅。快去睡覺。", 
        options: [] 
    },
    'q2_photo': { 
        you: "予延：這張。妳笑得很傻的那張。", 
        options: [] 
    }
};
function openApp(id) { document.getElementById(id).classList.add('active'); }
function closeApp() { 
    if(document.getElementById('chat-yuyan').classList.contains('active')) return; 
    document.getElementById('lock-screen').style.transform='translateY(0)'; 
}
function showOptions() {
    const data = gameData[currentKey];
    const overlay = document.getElementById('options');
    overlay.innerHTML = '';
    data.options.forEach(opt => {
        const btn = document.createElement('div'); btn.className = 'option-btn';
        btn.innerText = opt.text;
        btn.onclick = () => {
            const box = document.getElementById('chat-box');
            overlay.style.display = 'none';
            box.innerHTML += `<div class="bubble me">${opt.text}</div>`;
            currentKey = opt.next;
            setTimeout(() => {
                box.innerHTML += `<div class="bubble you">${gameData[currentKey].you}</div>`;
                box.scrollTop = box.scrollHeight;
            }, 800);
        };
        overlay.appendChild(btn);
    });
    overlay.style.display = 'flex';
}
</script>
</body>
</html>
