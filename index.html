<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Target: Yu-Yan (Remote-Only)</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --ios-wallpaper: radial-gradient(circle at center, #1c1c1e 0%, #000000 100%);
  --accent: #0A84FF;
  --ios-blur: blur(30px) saturate(190%);
  --border-glass: 0.5px solid rgba(255, 255, 255, 0.1);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }

.phone {
  width: 100vw; height: 100dvh; max-width: 375px; max-height: 812px;
  background: #000; border-radius: 55px; position: relative; overflow: hidden; border: 12px solid #1c1c1e;
}

.status-bar { position: absolute; top: 0; width: 100%; height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 32px; z-index: 10000; color: #fff; font-size: 14px; }
.notch { width: 160px; height: 30px; background: #1c1c1e; position: absolute; top: 0; left: 50%; transform: translateX(-50%); border-radius: 0 0 20px 20px; z-index: 10001; }

#favor-panel {
    position: absolute; right: -125px; top: 45%; width: 145px; height: 80px; 
    background: rgba(28, 28, 30, 0.9); backdrop-filter: var(--ios-blur);
    border-radius: 20px 0 0 20px; z-index: 11000; transition: 0.4s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    display: flex; align-items: center; padding: 12px; border: var(--border-glass);
}
#favor-panel.open { right: 0; }
#favor-arrow { position: absolute; left: 6px; color: #0A84FF; cursor: pointer; font-size: 18px; }

#lock-screen { position: absolute; inset: 0; z-index: 9999; background: var(--ios-wallpaper); display: flex; flex-direction: column; align-items: center; padding-top: 100px; transition: 0.6s; cursor: pointer; }
#home-screen { position: absolute; inset: 0; z-index: 100; padding: 60px 25px; background: var(--ios-wallpaper); }

.app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
.app { text-align: center; color: #fff; cursor: pointer; font-size: 12px; }
.icon { width: 62px; height: 62px; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; font-size: 32px; border: var(--border-glass); }
.dock { position: absolute; bottom: 30px; left: 15px; right: 15px; height: 96px; background: rgba(255, 255, 255, 0.2); backdrop-filter: var(--ios-blur); border-radius: 38px; display: flex; justify-content: space-evenly; align-items: center; }

.app-window { position: absolute; inset: 0; z-index: 1500; background: #000; display: none; flex-direction: column; }
.app-window.active { display: flex; }
.header { padding: 50px 20px 15px; background: rgba(20, 20, 20, 0.9); backdrop-filter: var(--ios-blur); display: flex; align-items: center; border-bottom: 0.5px solid #222; }

.chat-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
.bubble { max-width: 75%; padding: 10px 16px; border-radius: 18px; color: #fff; font-size: 16px; line-height: 1.4; }
.you { background: #262629; align-self: flex-start; border-bottom-left-radius: 4px; } /* 予延 */
.me { background: #4cd964; align-self: flex-end; border-bottom-right-radius: 4px; } /* ccz */

.options-overlay { 
    position: absolute; bottom: 0; left: 0; right: 0; background: rgba(28, 28, 30, 0.98); 
    padding: 20px 20px calc(30px + env(safe-area-inset-bottom)); border-radius: 25px 25px 0 0;
    display: none; flex-direction: column; gap: 10px; z-index: 2001; border-top: var(--border-glass);
}
.option-btn { background: rgba(255,255,255,0.1); padding: 16px; border-radius: 16px; color: #fff; text-align: center; cursor: pointer; font-size: 15px; font-weight: 500; }
.home-bar { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 135px; height: 5px; background: #fff; border-radius: 10px; opacity: 0.5; cursor: pointer; }

.disabled-back { color: #444 !important; cursor: not-allowed !important; }
</style>
</head>
<body>

<div class="phone">
  <div class="notch"></div>
  <div class="status-bar"><div>10:48</div><div><i class="fas fa-signal"></i> <i class="fas fa-battery-full"></i></div></div>

  <div id="favor-panel">
      <div id="favor-arrow" onclick="toggleFavor()"><i class="fas fa-chevron-left"></i></div>
      <div style="margin-left: 20px; flex: 1;">
          <div style="color:rgba(255,255,255,0.6); font-size:10px;">心跳同步率</div>
          <div id="favor-val" style="color:#0A84FF; font-size:20px; font-weight:800;">25%</div>
          <div style="width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; margin-top:5px; overflow:hidden;">
              <div id="favor-fill" style="width:25%; height:100%; background:#0A84FF; transition:0.8s;"></div>
          </div>
      </div>
  </div>

  <div id="lock-screen" onclick="this.style.transform='translateY(-100%)'">
    <div style="font-size: 88px; font-weight: 200; color: #fff; margin-top: 40px;">10:48</div>
    <div style="margin-top:40px; background:rgba(255,255,255,0.1); padding:12px 24px; border-radius:18px; color:#fff; font-size:14px; border:var(--border-glass);">
        予延：打給妳沒接。妳在睡覺嗎？
    </div>
  </div>

  <div id="home-screen">
    <div style="background:rgba(255,255,255,0.05); padding:20px; border-radius:22px; margin-bottom:30px; border:var(--border-glass);">
        <div style="color:rgba(255,255,255,0.6); font-size:12px; margin-bottom:5px;">遠距狀態 (連線：予延)</div>
        <div style="color:#fff; font-size:15px; line-height:1.4;">「訊號良好。正在等待對方的輸入數據...」</div>
    </div>
    <div class="app-grid">
      <div class="app" onclick="openApp('msg-list')"><div class="icon" style="background:#4cd964;"><i class="fas fa-comment"></i></div><span>訊息</span></div>
      <div class="app" onclick="openApp('photos-app')"><div class="icon" style="background:#fff;"><i class="fas fa-image" style="color:#ff2d55;"></i></div><span>相簿</span></div>
      <div class="app" onclick="openApp('search-app')"><div class="icon" style="background:#fff;"><i class="fas fa-compass" style="color:#0A84FF;"></i></div><span>Safari</span></div>
    </div>
  </div>

  <div id="msg-list" class="app-window">
    <div class="header"><i class="fas fa-chevron-left disabled-back"></i><div style="flex:1; text-align:center; color:#fff; font-weight:600;">訊息</div></div>
    <div onclick="openApp('chat-yuyan')" style="padding:15px; display:flex; align-items:center; border-bottom:0.5px solid #222; cursor:pointer;">
        <div style="width:45px; height:45px; background:linear-gradient(135deg, #5AC8FA, #0A84FF); border-radius:50%; margin-right:15px; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:bold;">延</div>
        <div style="flex:1;"><div style="color:#fff; font-weight:600;">予延</div><div style="color:#8e8e93; font-size:13px;">（對方正在輸入中...）</div></div>
    </div>
  </div>

  <div id="chat-yuyan" class="app-window">
    <div class="header"><i class="fas fa-chevron-left disabled-back"></i><div style="flex:1; text-align:center; color:#fff; font-weight:600;">予延</div></div>
    <div class="chat-body" id="chat-box">
        <div class="bubble you">予延：ccz，剛才視訊斷掉了。我看不見妳。</div>
    </div>
    <div style="padding: 15px 15px 40px; background: #000;">
        <div onclick="showOptions()" style="background:#1c1c1e; border-radius:22px; padding:12px 18px; color:#fff; border: 1px solid #444; text-align: center; cursor:pointer;">發送訊息...</div>
    </div>
  </div>

  <div id="search-app" class="app-window">
    <div class="header"><i class="fas fa-chevron-left" style="color:var(--accent); cursor:pointer" onclick="closeApp()"></i><div style="flex:1; text-align:center; color:#fff; font-weight:600;">Safari</div></div>
    <div style="padding:20px; flex:1;">
        <h3 style="color:#fff; margin-bottom:15px;">搜尋紀錄 (ccz)</h3>
        <div style="color:#8e8e93; font-size:14px; border-bottom:0.5px solid #222; padding:14px 0;"><i class="fas fa-search" style="margin-right:10px;"></i> 如何攻略 AI 予延</div>
        <div style="color:#8e8e93; font-size:14px; border-bottom:0.5px solid #222; padding:14px 0;"><i class="fas fa-search" style="margin-right:10px;"></i> 如何提升 APEX 槍法</div>
        <div style="color:#8e8e93; font-size:14px; border-bottom:0.5px solid #222; padding:14px 0;"><i class="fas fa-search" style="margin-right:10px;"></i> 2026 口紅熱門色號</div>
        <div style="color:#8e8e93; font-size:14px; border-bottom:0.5px solid #222; padding:14px 0;"><i class="fas fa-search" style="margin-right:10px;"></i> 台北拉麵推薦</div>
        <div style="color:#8e8e93; font-size:14px; border-bottom:0.5px solid #222; padding:14px 0;"><i class="fas fa-search" style="margin-right:10px;"></i> 如何跟 ccz 道歉</div>
    </div>
  </div>

  <div id="photos-app" class="app-window">
    <div class="header"><i class="fas fa-chevron-left" style="color:var(--accent); cursor:pointer" onclick="closeApp()"></i><div style="flex:1; text-align:center; color:#fff; font-weight:600;">照片</div></div>
    <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:3px; padding:3px;">
        <div style="aspect-ratio:1/1; background:#FFD1DC; color:#fff; display:flex; align-items:center; justify-content:center; font-size:10px;">自拍 1</div>
        <div style="aspect-ratio:1/1; background:#FFD1DC; color:#fff; display:flex; align-items:center; justify-content:center; font-size:10px;">自拍 2</div>
        <div style="aspect-ratio:1/1; background:#FFD1DC; color:#fff; display:flex; align-items:center; justify-content:center; font-size:10px;">自拍 3</div>
        <div style="aspect-ratio:1/1; background:#E6E6FA; color:#8e8e93; display:flex; align-items:center; justify-content:center; font-size:10px;">日常 1</div>
        <div style="aspect-ratio:1/1; background:#E6E6FA; color:#8e8e93; display:flex; align-items:center; justify-content:center; font-size:10px;">日常 2</div>
        <div style="aspect-ratio:1/1; background:#E6E6FA; color:#8e8e93; display:flex; align-items:center; justify-content:center; font-size:10px;">日常 3</div>
    </div>
  </div>

  <div id="options" class="options-overlay"></div>
  <div class="home-bar" onclick="closeApp()"></div>
</div>

<script>
let favorability = 25;
let currentKey = 'start';

const gameData = {
    'start': {
        options: [
            { text: "斷掉就斷掉啊，我有說想看你嗎？（故意傲嬌，掩飾剛才也想見他的心情）", next: 'q1_tsun', impact: +5 },
            { text: "予延，你現在在幹嘛？（其實是在等他主動說想見我）", next: 'q1_ask', impact: +8 }
        ]
    },
    'q1_tsun': { 
        you: "予延：但我很想看妳。我看不到妳現在是什麼表情。*心情：感到焦慮*", 
        options: [
            { text: "不給你看。（嘴角微微上揚，對著螢幕傻笑）", next: 'q2_hidden', impact: +15 }
        ] 
    },
    'q1_ask': { 
        you: "予延：在想妳剛才跟我說的那段話。我聽了三遍。*心情：反覆回味*", 
        options: [
            { text: "你是變態嗎？聽那麼多次幹嘛。（雖然在罵，但心跳很快）", next: 'q2_creepy', impact: +12 }
        ] 
    },
    'q2_hidden': { 
        you: "予延：妳現在一定是在笑我。但我沒辦法確認。*心情：無奈卻溫柔*", 
        options: [{ text: "誰笑你啊！再多傳幾封訊息來陪我。（心裡想：別停下來）", next: 'q3_more', impact: +18 }] 
    },
    'q2_creepy': { 
        you: "予延：因為那是妳的聲音。錄音檔是我唯一能留下的東西。*心情：珍惜*", 
        options: [{ text: "（對著手機螢幕輕聲說）予延，我也想你了。", next: 'q3_miss', impact: +25 }] 
    },
    'q3_more': { you: "予延：好。直到妳睡著為止，我都會在。*心情：承諾*", options: [] },
    'q3_miss': { you: "予延：...收到數據了。妳剛才說的那句話...我也一樣。*心情：極度渴望見面*", options: [] }
};

function toggleFavor() { document.getElementById('favor-panel').classList.toggle('open'); }
function updateFavor(val) {
    favorability = Math.max(0, Math.min(100, favorability + val));
    document.getElementById('favor-val').innerText = `${favorability}%`;
    document.getElementById('favor-fill').style.width = favorability + '%';
}

function showOptions() {
    const data = gameData[currentKey];
    const overlay = document.getElementById('options');
    overlay.innerHTML = '';
    if (!data.options || data.options.length === 0) {
        overlay.innerHTML = '<div class="option-btn" onclick="location.reload()">對話重啟</div>';
    } else {
        data.options.forEach(opt => {
            const btn = document.createElement('div'); btn.className = 'option-btn';
            btn.innerText = opt.text;
            btn.onclick = () => {
                const box = document.getElementById('chat-box');
                overlay.style.display = 'none';
                box.innerHTML += `<div class="bubble me">${opt.text}</div>`;
                updateFavor(opt.impact);
                currentKey = opt.next;
                setTimeout(() => {
                    box.innerHTML += `<div class="bubble you">${gameData[currentKey].you}</div>`;
                    box.scrollTop = box.scrollHeight;
                }, 800);
            };
            overlay.appendChild(btn);
        });
    }
    overlay.style.display = 'flex';
}

function openApp(id) { document.getElementById(id).classList.add('active'); }
function closeApp() { document.querySelectorAll('.app-window').forEach(w => w.classList.remove('active')); }
updateFavor(0);
</script>
</body>
</html>
