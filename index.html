<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>star.phone v2 - test</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg:#0b0b10;
  --glass:rgba(255,255,255,0.06);
  --text:#fff;
  --sub:#9aa0aa;
  --accent:#9b5cff;
  --radius:22px;
}
body{
  margin:0;background:#000;display:flex;justify-content:center;align-items:center;height:100vh;
  font-family:-apple-system,BlinkMacSystemFont;
}
.phone{
  width:360px;height:720px;background:var(--bg);border-radius:40px;overflow:hidden;position:relative;
  box-shadow:0 20px 60px rgba(0,0,0,.7);
}
.screen{position:absolute;inset:0;padding:16px;}
.hidden{display:none}
.time{font-size:64px;font-weight:600;}
.date{color:var(--sub);}
.app-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.app{text-align:center;font-size:12px;color:#fff;}
.icon{
  width:60px;height:60px;border-radius:18px;background:var(--glass);
  display:flex;align-items:center;justify-content:center;margin:auto;font-size:22px;
}
.app-window{
  position:absolute;inset:0;background:var(--bg);
  transform:scale(.95);opacity:0;transition:.25s;
}
.app-window.active{transform:scale(1);opacity:1;}
.header{display:flex;justify-content:space-between;margin-bottom:10px;}
.btn{
  background:var(--glass);border:none;color:#fff;padding:6px 10px;border-radius:10px;
}
.chat{
  display:flex;flex-direction:column;gap:8px;
  overflow-y:auto;
  height:calc(100% - 120px);
}
.bubble{
  max-width:70%;padding:8px;border-radius:12px;font-size:13px;
}
.me{background:var(--accent);align-self:flex-end;}
.you{background:#333;align-self:flex-start;}
.typing{
  font-size:12px;color:var(--sub);
  animation:blink 1s infinite;
}
@keyframes blink{50%{opacity:.3}}
.bar{
  height:5px;width:120px;background:#fff3;border-radius:10px;
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
}
</style>
</head>
<body>
<div class="phone">

  <!-- 鎖屏 - 終極全點擊版（保證整塊都能點） -->
<div id="lock" class="screen" style="position: relative; width: 100%; height: 100%;">

  <!-- 這層才是真正負責點擊的超大透明層 -->
  <div id="lockOverlay" 
       style="position: absolute; inset: 0; z-index: 999; cursor: pointer; 
              background: transparent;">
  </div>

  <!-- 所有內容都放在這層下面 -->
  <div style="position: relative; z-index: 1; height: 100%; width: 100%; 
              display: flex; flex-direction: column; justify-content: center; align-items: center; 
              padding: 16px; box-sizing: border-box; pointer-events: none;">
    
    <div class="time" id="time"></div>
    <div class="date" id="date"></div>
   
    <div style="margin: 60px 0; color: #ccc; font-size: 18px; text-align: center; max-width: 80%;">
      「你不在，我其實也不太想解鎖。」
    </div>
   
    <div style="margin-top: auto; margin-bottom: 80px; color: var(--sub); font-size: 14px; opacity: 0.8; text-align: center;">
      點擊任何地方解鎖 <i class="fa-solid fa-hand-pointer" style="margin-left: 6px;"></i>
    </div>
  </div>
</div>

  <!-- 主畫面 -->
  <div id="home" class="screen hidden">
    <div class="app-grid" id="apps"></div>
  </div>

  <!-- Messages -->
  <div id="messages" class="app-window screen">
    <div class="header">
      <button class="btn" onclick="closeApp()">返回</button>
      <div>ccz</div>
    </div>
    <div id="chat" class="chat"></div>
    <div style="margin-top:10px">
      <input id="messageInput" style="width:100%;background:#111;border:none;color:#fff;padding:8px;border-radius:10px" placeholder="輸入訊息…（她不一定會回）">
    </div>
  </div>

  <!-- Love App -->
  <div id="love" class="app-window screen">
    <div class="header">
      <button class="btn" onclick="closeApp()">返回</button>
      <div>Relationship</div>
    </div>
    <div id="loveContent"></div>
  </div>

  <div class="bar"></div>
</div>

<script>
// 傻瓜最終版 - 把所有東西都寫在外面

// 1. 時間更新
function updateTime() {
    const timeEl = document.getElementById('time');
    const dateEl = document.getElementById('date');
    if (timeEl) {
        let d = new Date();
        timeEl.innerText = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }
}

// 2. 開啟 App
function openApp(id) {
    console.log("📱 點擊開啟:", id);
    document.querySelectorAll(".app-window").forEach(a => a.classList.remove("active"));
    const target = document.getElementById(id);
    if (target) target.classList.add("active");
}

// 3. 關閉 App
function closeApp() {
    console.log("🔙 執行 closeApp");
    document.querySelectorAll(".app-window").forEach(a => a.classList.remove("active"));
}

// 4. 頁面載入
window.onload = function() {
    console.log("✅ onload 執行成功");

    // 解鎖
    const overlay = document.getElementById('lockOverlay');
    if (overlay) {
        overlay.addEventListener('click', function() {
            console.log("🖱️ 點擊解鎖");
            const lock = document.getElementById('lock');
            const home = document.getElementById('home');
            lock.style.transition = 'all 0.6s';
            lock.style.opacity = '0';
            setTimeout(() => {
                lock.classList.add("hidden");
                home.classList.remove("hidden");
            }, 400);
        });
    }

    // 生成兩個 App
    const grid = document.getElementById("apps");
    grid.innerHTML = `
        <div class="app" style="cursor: pointer;" onclick="openApp('messages')">
            <div class="icon"><i class="fa-solid fa-comment"></i></div>messages
        </div>
        <div class="app" style="cursor: pointer;" onclick="openApp('love')">
            <div class="icon"><i class="fa-solid fa-heart"></i></div>love
        </div>
    `;

    // 返回按鈕
    document.querySelectorAll('.btn').forEach(btn => {
        if (btn.innerText.includes('返回')) {
            btn.addEventListener('click', closeApp);
        }
    });

    // 啟動時間
    updateTime();
    setInterval(updateTime, 1000);

    console.log("✅ 所有設定完成");
};
</script>
</body>
</html>
