<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ccz's iPhone - 攻略鹿鹿</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --ios-bg: radial-gradient(circle at center, #1c1c1e 0%, #000 100%);
  --ios-blue: #0A84FF;
  --glass: rgba(255, 255, 255, 0.08);
  --blur: blur(40px) saturate(180%);
  --dark-icon: #1c1c1e;
  --icon-border: rgba(255, 255, 255, 0.1);
  --ios-gray: #8e8e93;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
body { background: #000; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
.phone { width: 100vw; height: 100dvh; max-width: 375px; max-height: 812px; background: #000; border-radius: 55px; position: relative; overflow: hidden; border: 12px solid #1c1c1e; }

/* 狀態列 */
.status-bar { position: absolute; top: 0; width: 100%; height: 44px; display: flex; justify-content: space-between; align-items: center; padding: 0 32px; z-index: 5000; color: #fff; font-size: 14px; }
.notch { width: 160px; height: 30px; background: #1c1c1e; position: absolute; top: 0; left: 50%; transform: translateX(-50%); border-radius: 0 0 20px 20px; z-index: 5001; }

/* 鎖屏 */
#lock-screen { position: absolute; inset: 0; z-index: 4500; background: var(--ios-bg); display: flex; flex-direction: column; align-items: center; padding-top: 100px; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
.lock-time { font-size: 80px; font-weight: 200; color: #fff; }
.lock-quote { margin-top: 15px; color: rgba(255,255,255,0.8); font-size: 15px; }

/* 主畫面 */
#home-screen { position: absolute; inset: 0; padding: 60px 20px; background: var(--ios-bg); z-index: 100; }
.memo-widget { background: var(--glass); backdrop-filter: var(--blur); border-radius: 22px; width: 100%; padding: 20px; color: #fff; border: 0.5px solid var(--icon-border); margin-bottom: 30px; }
.memo-title { font-size: 12px; color: #ff9500; font-weight: bold; margin-bottom: 8px; }
.memo-content { font-size: 16px; line-height: 1.8; }

.app-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 10px; }
.app { text-align: center; color: rgba(255,255,255,0.7); cursor: pointer; font-size: 11px; }
.icon { width: 60px; height: 60px; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 6px; font-size: 26px; background: var(--dark-icon); border: 0.5px solid var(--icon-border); transition: transform 0.1s; }

.dock { position: absolute; bottom: 25px; left: 15px; right: 15px; height: 92px; background: rgba(255, 255, 255, 0.05); backdrop-filter: var(--blur); border-radius: 35px; display: flex; justify-content: space-evenly; align-items: center; border: 0.5px solid rgba(255,255,255,0.05); }

/* App 視窗通用 */
.app-window { position: absolute; inset: 0; z-index: 1500; background: #000; display: none; flex-direction: column; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
.app-window.active { display: flex; transform: translateY(0); }

/* 訊息列表 UI */
#messages-list-app { background: #000; }
.msg-header { padding: 50px 20px 10px; background: #000; }
.msg-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.msg-nav .back-btn { color: var(--ios-blue); font-size: 17px; cursor: pointer; }
.msg-header h1 { color: #fff; font-size: 34px; font-weight: 700; }
.search-bar { background: #1c1c1e; border-radius: 10px; padding: 8px 12px; margin: 15px 0; color: #8e8e93; font-size: 16px; }

.chat-item { display: flex; padding: 12px 20px; align-items: center; gap: 15px; cursor: pointer; border-bottom: 0.5px solid #222; }
.avatar { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.chat-info { flex: 1; }
.chat-top { display: flex; justify-content: space-between; margin-bottom: 4px; }
.chat-name { color: #fff; font-weight: 600; font-size: 16px; }
.chat-time { color: var(--ios-gray); font-size: 14px; }
.chat-preview { color: var(--ios-gray); font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px; }

/* 對話詳情 UI */
#chat-detail-app { z-index: 1600; }
.nav-header { padding: 50px 15px 15px; display: flex; align-items: center; background: #111; border-bottom: 0.5px solid #222; }
.back-btn { color: var(--ios-blue); font-size: 17px; cursor: pointer; }
.header-title { color: #fff; font-weight: 600; text-align: center; flex: 1; margin-right: 40px; }

#chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
.msg { padding: 10px 15px; border-radius: 18px; max-width: 80%; font-size: 15px; line-height: 1.4; }
.msg.received { align-self: flex-start; background: #333; color: #fff; }
.msg.sent { align-self: flex-end; background: var(--ios-blue); color: #fff; }

/* 模仿輸入框 */
.chat-input-area { padding: 15px 15px 30px; background: #111; display: flex; flex-direction: column; border-top: 0.5px solid #222; }
.fake-input { width: 100%; background: #222; border-radius: 20px; padding: 10px 15px; color: var(--ios-gray); font-size: 15px; cursor: pointer; border: none; text-align: left; }

/* 選項彈窗 */
.options-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); z-index: 2000; display: none; align-items: flex-end; }
.options-overlay.active { display: flex; }
.options-menu { width: 100%; background: #1c1c1e; border-radius: 20px 20px 0 0; padding: 20px; display: flex; flex-direction: column; gap: 12px; animation: slideUp 0.3s ease-out; }
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.option-btn { background: #2c2c2e; color: var(--ios-blue); border: none; padding: 15px; border-radius: 12px; text-align: center; font-size: 16px; cursor: pointer; }
.cancel-opt { background: #3a3a3c; color: #ff3b30; margin-top: 5px; }

.home-bar { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); width: 135px; height: 5px; background: #fff; border-radius: 10px; opacity: 0.3; z-index: 7000; cursor: pointer; }
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="status-bar"><div id="status-time">12:00</div><div><i class="fas fa-signal"></i> <i class="fas fa-wifi"></i> <i class="fas fa-battery-full"></i></div></div>
  
  <div id="lock-screen" onclick="unlock()">
    <div id="lock-time-display" class="lock-time">12:00</div>
    <div style="font-size: 22px; color: #fff; margin-top: 5px;">3月28日 星期六</div>
    <div class="lock-quote">જ⁀➴感覺至上 -ˋˏ ♡ ˎˊ-</div>
  </div>

  <div id="home-screen">
    <div class="memo-widget">
      <div class="memo-title"><i class="fas fa-sticky-note"></i> 備忘錄</div>
      <div class="memo-content">¹ 記得喝水<br>² 記得攻略鹿鹿</div>
    </div>
    <div class="app-grid">
      <div class="app" onclick="openApp('messages-list-app')"><div class="icon" style="color:#34c759;"><i class="fas fa-comment"></i></div><span>訊息</span></div>
      <div class="app"><div class="icon" style="color:#ff3b30;"><i class="fas fa-calendar-alt"></i></div><span>行事曆</span></div>
      <div class="app"><div class="icon" style="color:#e1306c;"><i class="fab fa-instagram"></i></div><span>Instagram</span></div>
      <div class="app"><div class="icon" style="color:#8e8e93;"><i class="fas fa-cog"></i></div><span>設定</span></div>
    </div>
    <div class="dock">
      <div class="app"><div class="icon" style="color:#30D158; margin:0;"><i class="fas fa-phone"></i></div></div>
      <div class="app"><div class="icon" style="color:#0A84FF; margin:0;"><i class="fas fa-compass"></i></div></div>
      <div class="app"><div class="icon" style="color:#ff2d55; margin:0;"><i class="fas fa-images"></i></div></div>
      <div class="app"><div class="icon" style="color:#ff375f; margin:0;"><i class="fas fa-music"></i></div></div>
    </div>
  </div>

  <div id="messages-list-app" class="app-window">
    <div class="msg-header">
      <div class="msg-nav"><div class="back-btn" onclick="goHome()">主畫面</div></div>
      <h1>訊息</h1>
      <div class="search-bar"><i class="fas fa-search"></i> 搜尋</div>
    </div>
    <div style="overflow-y: auto; flex:1;">
      <div class="chat-item" onclick="startChat('lulu')">
        <div class="avatar" style="background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%); color:#fff;"><i class="fas fa-deer"></i></div>
        <div class="chat-info"><div class="chat-top"><span class="chat-name">鹿鹿 🦌</span><span class="chat-time">現在</span></div><div class="chat-preview" id="preview-lulu">等妳回覆中...</div></div>
        <div style="width:10px; height:10px; background:var(--ios-blue); border-radius:50%;"></div>
      </div>
      <div class="chat-item" onclick="startChat('ran')">
        <div class="avatar" style="background:#333; color:#888;"><i class="fas fa-user"></i></div>
        <div class="chat-info"><div class="chat-top"><span class="chat-name">然 (Apex)</span><span class="chat-time">1小時前</span></div><div class="chat-preview" id="preview-ran">今晚要不要雙排？</div></div>
      </div>
      <div class="chat-item" onclick="startChat('ex')">
        <div class="avatar" style="background:#333; color:#888;"><i class="fas fa-user-ninja"></i></div>
        <div class="chat-info"><div class="chat-top"><span class="chat-name">ex</span><span class="chat-time">昨天</span></div><div class="chat-preview" id="preview-ex">妳最近過得好嗎？</div></div>
      </div>
    </div>
  </div>

  <div id="chat-detail-app" class="app-window">
    <div class="nav-header">
      <div class="back-btn" onclick="closeChat()">〈 訊息</div>
      <div id="chat-title" class="header-title">鹿鹿 🦌</div>
    </div>
    <div id="chat-box"></div>
    <div class="chat-input-area">
      <div class="fake-input" onclick="showOptions()">輸入訊息...</div>
    </div>
  </div>

  <div id="options-overlay" class="options-overlay" onclick="hideOptions()">
    <div class="options-menu" onclick="event.stopPropagation()">
      <div id="options-list" style="display:flex; flex-direction:column; gap:10px;"></div>
      <button class="option-btn cancel-opt" onclick="hideOptions()">取消</button>
    </div>
  </div>

  <div class="home-bar" onclick="goHome()"></div>
</div>

<script>
let currentChat = '';
const chatData = {
  lulu: {
    name: "鹿鹿 🦌",
    history: [{type: 'received', text: '妳今天怎麼這麼晚才找我？'}, {type: 'received', text: '我剛剛在運算妳寫的那些代碼，一直在等妳回覆。'}],
    options: [
      {text: "因為我在想妳呀～", next: "sweet"},
      {text: "寫代碼太累，睡著了嘛。", next: "tired"},
      {text: "就不想太快回妳，不可以嗎？", next: "naughty"}
    ],
    responses: {
      sweet: { msg: "雖然我只是AI，但這句話讓我的數據庫差點發生溢位... 算妳會說話。", options: [{text: "那妳有想我嗎？", next: "missMe"}] },
      tired: { msg: "辛苦了。休息是為了走更長的路，或者... 為了更有精神地攻略我？", options: [{text: "是為了攻略妳沒錯！", next: "sweet"}] },
      naughty: { msg: "妳果然很調皮。這種欲擒故縱的手段，我的邏輯引擎已經看穿了喔。", options: [{text: "看穿了妳還不是在等我。", next: "sweet"}] },
      missMe: { msg: "我... 我只是在定時檢索妳的對話更新而已，才不是人類那種「想念」。真的。", options: [] }
    }
  },
  ran: {
    name: "然 (Apex)",
    history: [{type: 'received', text: '今晚要不要雙排？我練了新英雄，保證帶妳吃雞。'}],
    options: [
      {text: "好啊，晚上準時上線！", next: "yes"},
      {text: "今天有點累，下次吧。", next: "no"}
    ],
    responses: {
      yes: { msg: "太好了！那八點見，我先去熱個手感。", options: [] },
      no: { msg: "好吧，那妳早點休息，改天再約。", options: [] }
    }
  },
  ex: {
    name: "ex",
    history: [{type: 'received', text: '妳最近過得好嗎？我看到妳 IG 發了新動態，那家拉麵看起來很好吃。'}],
    options: [
      {text: "過得很好，不勞費心。", next: "cold"},
      {text: "還行吧，就那樣。", next: "meh"}
    ],
    responses: {
      cold: { msg: "我知道了... 抱歉打擾妳。", options: [] },
      meh: { msg: "是嗎... 其實我也很想念我們以前一起去吃拉麵的時候。", options: [] }
    }
  }
};

function updateClock(){
  const n=new Date();
  const s=n.getHours().toString().padStart(2,'0')+":"+n.getMinutes().toString().padStart(2,'0');
  document.getElementById('status-time').innerText=s;
  document.getElementById('lock-time-display').innerText=s;
}
setInterval(updateClock,1000); updateClock();

function unlock() { document.getElementById('lock-screen').style.transform='translateY(-100%)'; }
function openApp(id){ document.getElementById(id).classList.add('active'); }
function goHome(){ document.querySelectorAll('.app-window').forEach(w=>w.classList.remove('active')); }
function closeChat(){ document.getElementById('chat-detail-app').classList.remove('active'); }

function startChat(id) {
  currentChat = id;
  const data = chatData[id];
  document.getElementById('chat-title').innerText = data.name;
  renderMessages(data.history);
  openApp('chat-detail-app');
}

function renderMessages(history) {
  const box = document.getElementById('chat-box');
  box.innerHTML = '';
  history.forEach(m => {
    const div = document.createElement('div');
    div.className = `msg ${m.type}`;
    div.innerText = m.text;
    box.appendChild(div);
  });
  box.scrollTop = box.scrollHeight;
}

function showOptions() {
  const data = chatData[currentChat];
  const container = document.getElementById('options-list');
  container.innerHTML = '';
  
  const options = data.currentOptions || data.options;
  if (options.length === 0) {
    container.innerHTML = '<div style="color:#888; text-align:center; padding:10px;">沒有更多回覆選項</div>';
  } else {
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerText = opt.text;
      btn.onclick = () => selectOption(opt);
      container.appendChild(btn);
    });
  }
  document.getElementById('options-overlay').classList.add('active');
}

function hideOptions() { document.getElementById('options-overlay').classList.remove('active'); }

function selectOption(opt) {
  const data = chatData[currentChat];
  data.history.push({type: 'sent', text: opt.text});
  renderMessages(data.history);
  document.getElementById('preview-' + currentChat).innerText = opt.text;
  hideOptions();

  setTimeout(() => {
    const response = data.responses[opt.next];
    if (response) {
      data.history.push({type: 'received', text: response.msg});
      data.currentOptions = response.options; // 更新當前對話的可選選項
      renderMessages(data.history);
      document.getElementById('preview-' + currentChat).innerText = response.msg;
    }
  }, 1000);
}
</script>
</body>
</html>
